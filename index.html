<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펫다이어리 - 기획 고도화 버전</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        #imagePreview img { object-fit: cover; border-radius: 1rem; width: 100%; height: 200px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-left">

    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative overflow-x-hidden">
        </div>

    <script>
        let state = {
            step: 'landing',
            petData: { name: '', age: '', mode: '', personality: '' },
            diaries: [], // { date: '2024-01-01', content: '...', image: 'base64...' }
            tempImage: null
        };

        const app = document.getElementById('app');

        // --- 유틸리티: 날짜 기준 Day 카운팅 로직 ---
        function getUniqueDayCount() {
            if (state.diaries.length === 0) return 0;
            const uniqueDates = new Set(state.diaries.map(d => d.date));
            return uniqueDates.size;
        }

        function render() {
            if (state.step === 'landing') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-screen p-10 text-center slide-in">
                        <div class="w-20 h-20 bg-teal-500 rounded-[2rem] flex items-center justify-center text-white mb-8 shadow-xl shadow-teal-100">
                            <i class="fas fa-paw text-4xl"></i>
                        </div>
                        <h1 class="text-3xl font-black text-slate-900 mb-4 tracking-tighter">펫다이어리</h1>
                        <p class="text-slate-500 mb-12 font-medium">기록이 모여 책이 되는 순간</p>
                        <button onclick="goStep('onboarding-data')" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all">시작하기</button>
                    </div>
                `;
            } 
            
            else if (state.step === 'onboarding-data') {
                app.innerHTML = `
                    <div class="p-8 pt-20 bg-white min-h-screen flex flex-col slide-in">
                        <h2 class="text-2xl font-black text-slate-900 mb-8 leading-tight underline decoration-teal-500 underline-offset-8 text-left">아이 정보 입력</h2>
                        <div class="space-y-6 flex-grow">
                            <input type="text" id="petName" placeholder="아이 이름" class="w-full bg-slate-50 p-5 rounded-2xl border-none focus:ring-2 focus:ring-teal-500 outline-none" value="${state.petData.name}">
                            <input type="number" id="petAge" placeholder="나이" class="w-full bg-slate-50 p-5 rounded-2xl border-none focus:ring-2 focus:ring-teal-500 outline-none" value="${state.petData.age}">
                            <button onclick="saveData()" class="w-full bg-teal-500 text-white py-5 rounded-2xl font-bold text-lg mt-10 shadow-lg">다음으로</button>
                        </div>
                    </div>
                `;
            }

            else if (state.step === 'main-dashboard') {
                const dayCount = getUniqueDayCount();
                app.innerHTML = `
                    <div class="min-h-screen pb-24 slide-in">
                        <header class="bg-white px-6 py-5 flex justify-between items-center sticky top-0 z-20 border-b border-slate-100">
                            <h1 class="text-lg font-black text-slate-900">${state.petData.name}의 기록</h1>
                            <div class="flex gap-4 text-slate-400"><i class="fas fa-share-alt"></i><i class="fas fa-cog"></i></div>
                        </header>

                        <div class="p-6">
                            <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                                <p class="text-teal-400 font-bold text-[10px] uppercase tracking-widest mb-1">100일 챌린지</p>
                                <p class="text-3xl font-black mb-4 italic">Day ${dayCount}/100</p>
                                <div class="w-full bg-white/10 h-2 rounded-full overflow-hidden mb-4">
                                    <div class="bg-teal-400 h-full transition-all duration-500" style="width: ${Math.max(3, (dayCount / 100) * 100)}%"></div>
                                </div>
                                <p class="text-white/40 text-[10px]">
                                    기록 총 <b>${state.diaries.length}개</b> | 
                                    <b>${dayCount}일</b>째 연속 기록 중 🔥
                                </p>
                            </div>
                        </div>

                        <div class="px-6 space-y-4">
                            <h3 class="font-black text-slate-900">최근 타임라인</h3>
                            <div id="diaryList" class="space-y-6">
                                ${state.diaries.length === 0 ? '<div class="py-20 text-center text-slate-300 font-bold">첫 사진과 글을 남겨보세요!</div>' : ''}
                            </div>
                        </div>

                        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 z-30">
                            <button onclick="openModal()" class="bg-slate-900 text-white w-full py-5 rounded-2xl font-black text-lg shadow-2xl active:scale-95 transition-all">
                                <i class="fas fa-camera mr-2"></i> 일기 쓰기
                            </button>
                        </div>

                        <div id="modal" class="fixed inset-0 bg-slate-900/60 z-50 hidden items-end justify-center p-4 backdrop-blur-sm">
                            <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
                                <div class="flex justify-between items-center mb-6">
                                    <h2 class="text-xl font-black text-slate-900">오늘의 기록</h2>
                                    <button onclick="closeModal()" class="text-slate-400"><i class="fas fa-times"></i></button>
                                </div>
                                
                                <div id="imageArea" class="mb-6">
                                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleImage(this)">
                                    <div id="imagePreview" onclick="document.getElementById('fileInput').click()" class="w-full bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl h-48 flex flex-col items-center justify-center cursor-pointer overflow-hidden">
                                        <i class="fas fa-image text-slate-300 text-3xl mb-2"></i>
                                        <p class="text-slate-400 text-xs font-bold">사진 추가하기</p>
                                    </div>
                                </div>

                                <textarea id="diaryContent" class="w-full bg-slate-50 rounded-3xl p-6 h-32 outline-none mb-6 border-none text-slate-700" placeholder="무슨 일이 있었나요?"></textarea>
                                <button onclick="addDiary()" class="w-full bg-teal-500 text-white py-5 rounded-2xl font-black shadow-xl">기록 저장</button>
                            </div>
                        </div>
                    </div>
                `;
                renderDiaries();
            }
        }

        // --- 이미지 핸들링 ---
        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    state.tempImage = e.target.result;
                    document.getElementById('imagePreview').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function goStep(step) { state.step = step; render(); }
        
        function saveData() {
            state.petData.name = document.getElementById('petName').value;
            state.petData.age = document.getElementById('petAge').value;
            if (state.petData.name) goStep('main-dashboard');
        }

        function openModal() { 
            state.tempImage = null;
            document.getElementById('modal').style.display = 'flex'; 
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function addDiary() {
            const content = document.getElementById('diaryContent').value;
            if (!content && !state.tempImage) return;

            state.diaries.push({
                id: Date.now(),
                date: new Date().toLocaleDateString('en-CA'), // '2024-05-09' 형식으로 저장 (Day 카운팅용)
                displayDate: new Date().toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' }),
                content: content,
                image: state.tempImage
            });

            closeModal();
            render();
        }

        function renderDiaries() {
            const list = document.getElementById('diaryList');
            if(!list) return;
            // 최신순 정렬
            const sorted = [...state.diaries].reverse();
            list.innerHTML = sorted.map(d => `
                <div class="bg-white rounded-3xl border border-slate-50 shadow-sm overflow-hidden slide-in">
                    ${d.image ? `<img src="${d.image}" class="w-full h-64 object-cover">` : ''}
                    <div class="p-6">
                        <p class="text-[10px] font-black text-teal-500 mb-2 uppercase tracking-widest">${d.displayDate}</p>
                        <p class="text-slate-700 font-medium leading-relaxed">${d.content || '사진을 남겼습니다.'}</p>
                    </div>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
