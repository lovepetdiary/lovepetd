<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멍냥일기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .tab-active { color: #14b8a6; border-bottom: 3px solid #14b8a6; font-weight: bold; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #toast { visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #333; color: #fff; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 100; left: 50%; bottom: 50px; font-size: 14px; }
        #toast.show { visibility: visible; animation: fadeIn 0.3s, fadeOut 0.3s 2.5s; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-transition { transition: opacity 0.5s ease-in-out; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative flex flex-col">
    </div>
    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, fetchSignInMethodsForEmail, deleteUser, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, addDoc, query, where, getDocs, writeBatch, orderBy, limit, startAfter } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDn6hcoBuDPlv5pf-D3nF4tVa309H6ydvc",
            authDomain: "petdiary-595a2.firebaseapp.com",
            projectId: "petdiary-595a2",
            storageBucket: "petdiary-595a2.firebasestorage.app",
            messagingSenderId: "693055914176",
            appId: "1:693055914176:web:e98a698d7cade73a9ead25",
            measurementId: "G-2FEP68LDJK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const storage = getStorage();

        const appDiv = document.getElementById('app');
        let currentUser = null;
        let petData = null;
        let userData = null;
        let activeTab = 'home'; 
        let chatStep = 0;
        let setupData = { profileImageUrl: '', name: '', birthDate: '', focusArea: '' };
        let backPressCount = 0;
        
        // 페이지네이션용 변수
        let lastDiaryDoc = null;
        let diaryList = [];
        let isMoreDiaries = true;

        window.currentPublicSort = 'date';
        window.selectedDiaryDate = null;
        window.currentPrivateViewMode = null;
        window.currentRandomDiary = null;

        window.addEventListener('popstate', (event) => {
            const detailModal = document.getElementById('diaryModal');
            if (detailModal) detailModal.remove();
            const withdrawModal = document.getElementById('withdrawModal');
            if (withdrawModal) withdrawModal.remove();
            const communityModal = document.getElementById('communityDetailModal');
            if (communityModal) communityModal.remove();

            if (event.state && event.state.tab) {
                activeTab = event.state.tab;
                renderLayout();
            } else if (!event.state || (event.state && event.state.tab === 'home')) {
                if (activeTab === 'home') {
                    backPressCount++;
                    if (backPressCount === 1) {
                        showToast("펫다이어리를 나가시려면 뒤로 가기를 한 번 더 눌러주세요");
                        history.pushState({ tab: 'home' }, '', '#home');
                        setTimeout(() => { backPressCount = 0; }, 2000);
                    } else if (backPressCount === 2) {
                        window.location.replace('about:blank');
                    }
                } else {
                    activeTab = 'home';
                    renderLayout();
                }
            } else {
                renderLayout();
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await refreshPetData();
            } else {
                renderLogin();
            }
        });

        async function refreshPetData() {
            const petDoc = await getDoc(doc(db, "pets", currentUser.uid));
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            if (userDoc.exists()) userData = userDoc.data(); else userData = {};
            if (petDoc.exists()) {
                petData = petDoc.data();
                if(!history.state) history.replaceState({ tab: 'home' }, '', '#home');
                renderLayout();
            } else {
                renderPetSetup();
            }
        }

        function showToast(msg) {
            const x = document.getElementById("toast");
            x.innerText = msg;
            x.className = "show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
        }

        // --- 이미지 리사이징 헬퍼 함수 ---
        async function resizeImage(file, maxWidth = 2000) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                        }, 'image/jpeg', 0.85);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        window.checkPasswordMatch = () => {
            const p1 = document.getElementById('signupPassword').value;
            const p2 = document.getElementById('signupPasswordConfirm').value;
            const msg = document.getElementById('pwMatchMsg');
            if (p2 && p1 !== p2) {
                msg.innerText = "비밀번호가 일치하지 않습니다.";
                msg.classList.add('text-red-500');
            } else if (p2 && p1 === p2) {
                msg.innerText = "비밀번호가 일치합니다.";
                msg.classList.remove('text-red-500');
                msg.classList.add('text-teal-500');
            } else { msg.innerText = ""; }
        };

        window.execDaumPostcode = () => {
            new daum.Postcode({ oncomplete: (data) => {
                document.getElementById('signupAddress').value = data.roadAddress;
                document.getElementById('signupAddressDetail').focus();
            }}).open();
        };

        window.execDaumPostcodeEdit = () => {
            new daum.Postcode({ oncomplete: (data) => {
                document.getElementById('editUserAddress').value = data.roadAddress;
            }}).open();
        };

        window.checkEmailDuplicate = async () => {
            const email = document.getElementById('signupEmail').value;
            if(!email) return alert("이메일을 입력해 주세요.");
            try {
                const methods = await fetchSignInMethodsForEmail(auth, email);
                if (methods.length > 0) alert("이미 사용 중인 이메일입니다.");
                else alert("사용 가능한 이메일입니다.");
            } catch (e) { alert("이메일 형식을 확인해 주세요."); }
        };

        window.togglePassword = (id) => {
            const input = document.getElementById(id);
            input.type = (input.type === "password") ? "text" : "password";
        };

        window.renderLogin = function() {
            appDiv.innerHTML = `
                <div class="flex flex-col items-center justify-center h-screen p-8 text-center animate-fade-in">
                    <div class="w-20 h-20 bg-teal-500 rounded-[2rem] flex items-center justify-center mb-6 shadow-xl">
                        <i class="fas fa-paw text-white text-4xl"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-800 mb-2">펫다이어리</h1>
                    <p class="text-slate-400 mb-10 text-sm">반려동물과 함께하는 특별한 여정</p>
                    <div class="w-full space-y-3">
                        <input id="email" type="email" placeholder="이메일 주소" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500 transition">
                        <input id="password" type="password" placeholder="비밀번호" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500 transition">
                        <button onclick="handleLogin()" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-bold shadow-lg mt-2">로그인</button>
                        <button onclick="renderSignup()" class="w-full p-4 text-slate-500 font-medium">처음이신가요? 회원가입</button>
                    </div>
                </div>
            `;
        };

        window.renderSignup = function() {
            appDiv.innerHTML = `
                <div class="p-8 animate-fade-in flex flex-col h-screen overflow-y-auto bg-white">
                    <button onclick="renderLogin()" class="text-slate-400 mb-6 self-start"><i class="fas fa-arrow-left"></i> 뒤로</button>
                    <h2 class="text-2xl font-bold text-slate-800 mb-6">회원가입</h2>
                    <div class="space-y-3 mb-6">
                        <div class="flex gap-2">
                            <input id="signupEmail" type="email" placeholder="이메일 주소 (필수)" class="flex-1 p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-teal-500">
                            <button onclick="checkEmailDuplicate()" class="px-4 bg-slate-800 text-white rounded-2xl text-xs font-bold">중복확인</button>
                        </div>
                        <input id="signupPassword" type="password" placeholder="비밀번호 (6자 이상)" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-teal-500">
                        <input id="signupPasswordConfirm" type="password" oninput="checkPasswordMatch()" placeholder="비밀번호 확인" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-teal-500">
                        <p id="pwMatchMsg" class="text-[11px] ml-2 font-bold h-4"></p>
                    </div>
                    <button onclick="processSignup()" class="w-full p-4 bg-teal-500 text-white rounded-2xl font-bold shadow-lg mb-8">가입하고 시작하기</button>
                </div>
            `;
        };

        function renderPetSetup() {
            chatStep = 0;
            appDiv.innerHTML = `<div class="flex flex-col h-screen bg-slate-50 w-full animate-fade-in"><div class="p-4 bg-white shadow-sm flex items-center border-b border-slate-100 z-10"><div class="w-10 h-10 bg-teal-500 rounded-full flex items-center justify-center text-white mr-3"><i class="fas fa-robot"></i></div><div><h2 class="font-bold text-slate-800 text-sm">멍냥일기 도우미</h2><p class="text-[10px] text-teal-500">온라인</p></div></div><div id="chatContainer" class="flex-1 overflow-y-auto p-5 space-y-4 pb-20"></div><div id="chatInputArea" class="p-4 bg-white border-t border-slate-100 min-h-[80px] flex items-center justify-center"></div></div>`;
            nextChatStep();
        }

        function appendBotMsg(text) {
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = "flex w-full animate-fade-in mb-2";
            msg.innerHTML = `<div class="bg-white p-3.5 rounded-2xl rounded-tl-sm shadow-sm text-sm text-slate-700 max-w-[85%] border border-slate-100">${text}</div>`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        function appendUserMsg(text) {
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = "flex w-full justify-end animate-fade-in mb-4";
            msg.innerHTML = `<div class="bg-teal-500 p-3.5 rounded-2xl rounded-tr-sm shadow-sm text-sm text-white max-w-[85%]">${text}</div>`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        window.nextChatStep = () => {
            const inputArea = document.getElementById('chatInputArea');
            inputArea.innerHTML = '';
            if (chatStep === 0) {
                setTimeout(() => appendBotMsg("가입을 환영합니다! 🎉<br>아이와의 특별한 기록을 시작해볼까요?"), 500);
                setTimeout(() => {
                    appendBotMsg("먼저, 우리 예쁜 아이의 사진을 보여주시겠어요?");
                    inputArea.innerHTML = `<input type="file" id="setupProfileInput" class="hidden" accept="image/*" onchange="handleSetupImage(event)"><button onclick="document.getElementById('setupProfileInput').click()" class="flex-1 py-3 bg-teal-50 text-teal-600 font-bold rounded-xl">사진 고르기</button><button onclick="skipSetupImage()" class="ml-2 px-4 py-3 text-slate-400 text-sm">건너뛰기</button>`;
                }, 1500);
            } else if (chatStep === 1) {
                setTimeout(() => {
                    appendBotMsg("너무 귀엽네요! 😍 이 아이의 이름은 무엇인가요?");
                    inputArea.innerHTML = `<input type="text" id="setupNameInput" placeholder="이름 입력" class="flex-1 p-3 bg-slate-100 rounded-xl outline-none mr-2 px-4"><button onclick="handleSetupName()" class="w-12 h-12 bg-teal-500 text-white rounded-xl flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>`;
                }, 500);
            } else if (chatStep === 2) {
                setTimeout(() => {
                    appendBotMsg(`'${setupData.name}'! 이름이 참 예뻐요. 😊`);
                    setTimeout(() => {
                        appendBotMsg(`${setupData.name}가 태어난 날이나 입양된 날짜를 알려주시면 좋겠어요!`);
                        inputArea.innerHTML = `<input type="date" id="setupBirthInput" class="flex-1 p-3 bg-slate-100 rounded-xl outline-none mr-2 px-4 text-slate-600"><button onclick="handleSetupBirth()" class="w-12 h-12 bg-teal-500 text-white rounded-xl flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>`;
                    }, 1000);
                }, 500);
            } else if (chatStep === 3) {
                setTimeout(() => {
                    appendBotMsg(`준비 끝! 이제 시작해볼까요? ✨`);
                    inputArea.innerHTML = `<button onclick="finishSetup()" class="w-full p-4 bg-teal-500 text-white font-bold rounded-xl">다이어리 시작하기</button>`;
                }, 500);
            }
        };

        window.handleSetupImage = async (e) => {
            let file = e.target.files[0];
            if (!file) return;
            file = await resizeImage(file, 2000);
            const storageRef = ref(storage, `profiles/${currentUser.uid}_${Date.now()}`);
            const snap = await uploadBytes(storageRef, file);
            setupData.profileImageUrl = await getDownloadURL(snap.ref);
            appendUserMsg("사진을 골랐어요!");
            chatStep++; nextChatStep();
        };
        window.skipSetupImage = () => { appendUserMsg("나중에 올릴게요."); chatStep++; nextChatStep(); };
        window.handleSetupName = () => { setupData.name = document.getElementById('setupNameInput').value; appendUserMsg(setupData.name); chatStep++; nextChatStep(); };
        window.handleSetupBirth = () => { setupData.birthDate = document.getElementById('setupBirthInput').value; appendUserMsg(setupData.birthDate); chatStep++; nextChatStep(); };
        window.finishSetup = async () => {
            await setDoc(doc(db, "pets", currentUser.uid), setupData);
            await refreshPetData();
        };

        window.processSignup = async () => {
            const email = document.getElementById('signupEmail').value;
            const pwd = document.getElementById('signupPassword').value;
            if(!email || !pwd) return alert("입력 정보를 확인해 주세요.");
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pwd);
                await setDoc(doc(db, "users", userCredential.user.uid), { email, preferredViewMode: 'card', createdAt: Date.now() });
            } catch (e) { alert("회원가입 실패: " + e.message); }
        };

        window.handleLogin = async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value); }
            catch (e) { alert("로그인 실패!"); }
        };

        function renderLayout() {
            if (!petData) return;
            appDiv.innerHTML = `
                <nav class="sticky top-0 bg-white/80 backdrop-blur-md z-30 border-b border-slate-100">
                    <div class="flex justify-between items-center px-6 pt-6 pb-2">
                        <div class="flex items-center gap-2 cursor-pointer" onclick="changeTab('home')">
                            <i class="fas fa-paw text-2xl text-teal-500"></i>
                            <img src="${petData.profileImageUrl || 'https://via.placeholder.com/150'}" class="w-8 h-8 rounded-full object-cover shadow-sm ml-1">
                            <span class="font-bold text-slate-800 text-sm">${petData.name}</span>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="renderEditPet()" class="text-xs font-bold text-teal-600 bg-teal-50 px-3 py-1.5 rounded-full">정보수정</button>
                            <button onclick="handleLogout()" class="text-xs font-bold text-slate-400">로그아웃</button>
                        </div>
                    </div>
                    <div class="flex overflow-x-auto no-scrollbar px-2">
                        <button onclick="changeTab('home')" class="flex-none px-4 py-3 text-sm ${activeTab === 'home' ? 'tab-active' : 'text-slate-400'}">소중하개🐾</button>
                        <button onclick="changeTab('intro')" class="flex-none px-4 py-3 text-sm ${activeTab === 'intro' ? 'tab-active' : 'text-slate-400'}">알아보개🐾</button>
                        <button onclick="changeTab('diary')" class="flex-none px-4 py-3 text-sm ${activeTab === 'diary' ? 'tab-active' : 'text-slate-400'}">소중하개🐾</button>
                        <button onclick="changeTab('public')" class="flex-none px-4 py-3 text-sm ${activeTab === 'public' ? 'tab-active' : 'text-slate-400'}">함께하개🐾</button>
                        <button onclick="changeTab('community')" class="flex-none px-4 py-3 text-sm ${activeTab === 'community' ? 'tab-active' : 'text-slate-400'}">소통하개🐾</button>
                    </div>
                </nav>
                <div id="content-area" class="flex-1 overflow-y-auto pb-20"></div>
                <button onclick="renderWrite()" class="fixed bottom-8 right-8 w-14 h-14 bg-teal-500 text-white rounded-full shadow-2xl flex items-center justify-center text-xl z-40 transition hover:scale-110"><i class="fas fa-edit"></i></button>
            `;
            // 탭 이동 시 리스트 초기화
            lastDiaryDoc = null;
            diaryList = [];
            isMoreDiaries = true;
            updateContent();
        }

        window.changeTab = (tab) => { 
            activeTab = tab; 
            window.selectedDiaryDate = null;
            history.pushState({ tab }, '', `#${tab}`); 
            renderLayout(); 
        };

        async function updateContent() {
            const area = document.getElementById('content-area');
            if (activeTab === 'home') renderHome(area);
            else if (activeTab === 'intro') renderIntro(area);
            else if (activeTab === 'diary') renderDiaryList(area, 'private');
            else if (activeTab === 'public') renderDiaryList(area, 'public');
            else if (activeTab === 'community') renderCommunity(area);
        }

        function renderIntro(container) {
            container.innerHTML = `
                <div class="p-6 animate-fade-in space-y-6 pb-24 text-center">
                    <h2 class="text-xl font-bold text-slate-800">멍냥일기 혜택</h2>
                    <div class="space-y-4">
                        <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 flex items-center gap-4">
                            <div class="w-14 h-14 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0">30일</div>
                            <div class="text-left"><h3 class="font-bold text-slate-800 text-sm">커스텀 마그넷</h3></div>
                        </div>
                        <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 flex items-center gap-4">
                            <div class="w-14 h-14 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0">60일</div>
                            <div class="text-left"><h3 class="font-bold text-slate-800 text-sm">프리미엄 사료</h3></div>
                        </div>
                        <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 flex items-center gap-4">
                            <div class="w-14 h-14 bg-purple-100 text-purple-500 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0 whitespace-nowrap">100일</div>
                            <div class="text-left"><h3 class="font-bold text-slate-800 text-sm">커스텀 폰케이스</h3></div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- 소통하개 게시판 (목록형으로 변경) ---
        async function renderCommunity(container) {
            container.innerHTML = `
                <div class="p-4 animate-fade-in">
                    <div class="bg-white p-4 rounded-3xl border border-slate-100 mb-6">
                        <textarea id="communityInput" rows="2" class="w-full bg-slate-50 rounded-xl p-3 text-sm outline-none resize-none" placeholder="내용을 입력하세요."></textarea>
                        <div class="flex justify-end mt-2"><button onclick="saveCommunityPost()" class="px-5 py-2 bg-teal-500 text-white rounded-full text-xs font-bold">글쓰기</button></div>
                    </div>
                    <div class="bg-white rounded-3xl border border-slate-100 overflow-hidden shadow-sm">
                        <table class="w-full text-left text-[11px]">
                            <thead class="bg-slate-50 text-slate-400 border-b">
                                <tr>
                                    <th class="px-4 py-3 font-medium">제목</th>
                                    <th class="px-2 py-3 font-medium text-center">작성자</th>
                                    <th class="px-2 py-3 font-medium text-center">날짜</th>
                                    <th class="px-2 py-3 font-medium text-center">공감</th>
                                </tr>
                            </thead>
                            <tbody id="communityList"></tbody>
                        </table>
                    </div>
                </div>
            `;
            loadCommunityPosts();
        }

        window.loadCommunityPosts = async () => {
            const listDiv = document.getElementById('communityList');
            const snap = await getDocs(query(collection(db, "community"), orderBy("timestamp", "desc")));
            let posts = [];
            snap.forEach(d => posts.push({id: d.id, ...d.data()}));
            
            listDiv.innerHTML = posts.map(item => {
                const authorName = item.userEmail ? item.userEmail.split('@')[0] : '익명';
                const date = new Date(item.timestamp).toLocaleDateString('ko-KR').slice(2, -1);
                const title = item.content.split('\n')[0].substring(0, 15) + (item.content.length > 15 ? '...' : '');
                return `
                    <tr class="border-b last:border-0 cursor-pointer hover:bg-slate-50" onclick="showCommunityDetail('${item.id}')">
                        <td class="px-4 py-4 font-bold text-slate-700">${title}</td>
                        <td class="px-2 py-4 text-slate-400 text-center">${authorName}</td>
                        <td class="px-2 py-4 text-slate-400 text-center">${date}</td>
                        <td class="px-2 py-4 text-slate-400 text-center"><i class="fas fa-heart text-red-300"></i> ${item.likes?.length || 0}</td>
                    </tr>
                `;
            }).join('');
        };

        window.showCommunityDetail = async (id) => {
            const d = await getDoc(doc(db, "community", id));
            const item = d.data();
            const modal = document.createElement('div');
            modal.id = "communityDetailModal";
            modal.className = "fixed inset-0 bg-black/80 z-[110] flex items-center justify-center p-6 animate-fade-in";
            modal.onclick = () => modal.remove();
            modal.innerHTML = `
                <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 relative shadow-2xl" onclick="event.stopPropagation()">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold text-teal-600">${item.userEmail.split('@')[0]}</span>
                        <button onclick="document.getElementById('communityDetailModal').remove()" class="text-slate-300"><i class="fas fa-times"></i></button>
                    </div>
                    <p class="text-slate-800 text-sm leading-relaxed mb-6">${item.content.replace(/\n/g, '<br>')}</p>
                    <div class="flex gap-2">
                        <button onclick="toggleCommunityLike('${id}'); document.getElementById('communityDetailModal').remove();" class="flex-1 p-3 bg-red-50 text-red-500 rounded-xl font-bold text-xs"><i class="fas fa-heart"></i> 공감하기</button>
                        ${item.userId === currentUser.uid ? `<button onclick="deleteCommunityPost('${id}'); document.getElementById('communityDetailModal').remove();" class="flex-1 p-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs">삭제</button>` : ''}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.saveCommunityPost = async () => {
            const content = document.getElementById('communityInput').value.trim();
            if(!content) return alert('내용을 입력해주세요!');
            await addDoc(collection(db, "community"), {
                content, userId: currentUser.uid, userEmail: currentUser.email, timestamp: Date.now(), likes: []
            });
            document.getElementById('communityInput').value = '';
            loadCommunityPosts();
        };

        window.toggleCommunityLike = async (id) => {
            const docRef = doc(db, "community", id);
            const d = await getDoc(docRef);
            let likes = d.data().likes || [];
            if (likes.includes(currentUser.uid)) likes = likes.filter(uid => uid !== currentUser.uid);
            else likes.push(currentUser.uid);
            await updateDoc(docRef, { likes });
            loadCommunityPosts();
        };

        window.deleteCommunityPost = async (id) => {
            if(confirm("삭제할까요?")) { await deleteDoc(doc(db, "community", id)); loadCommunityPosts(); }
        };

        // --- 홈 화면 (꼬불꼬불 산책로 개선) ---
        async function renderHome(container) {
            const snap = await getDocs(query(collection(db, "diaries"), where("userId", "==", currentUser.uid)));
            let uniqueActualDates = new Set();
            snap.forEach(doc => {
                const data = doc.data();
                uniqueActualDates.add(data.actualCreatedDate || new Date(data.timestamp).toISOString().split('T')[0]);
            });

            let streakCount = 0;
            const todayStr = new Date().toISOString().split('T')[0];
            let checkDate = new Date();
            if (!uniqueActualDates.has(todayStr)) checkDate.setDate(checkDate.getDate() - 1);
            while (uniqueActualDates.has(checkDate.toISOString().split('T')[0])) {
                streakCount++;
                checkDate.setDate(checkDate.getDate() - 1);
            }

            const birthDateObj = new Date(petData.birthDate);
            const diffDays = Math.floor((Date.now() - birthDateObj.getTime()) / 86400000) + 1;
            let progressPercent = Math.min((streakCount / 100) * 100, 100);

            container.innerHTML = `
                <div class="p-6 animate-fade-in space-y-6">
                    <div class="relative w-full aspect-square rounded-[3rem] overflow-hidden shadow-2xl bg-slate-100">
                        <img src="${petData.profileImageUrl || 'https://via.placeholder.com/400'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                        <div class="absolute bottom-8 left-8 text-white z-10">
                            <h2 class="text-3xl font-bold mb-1">${petData.name}</h2>
                            <p class="text-teal-300 font-bold">생후 ${diffDays}일째</p>
                        </div>
                    </div>
                    
                    <div class="bg-emerald-50 rounded-[2.5rem] shadow-sm border border-emerald-100 p-6 pt-8 mt-6 relative overflow-hidden pb-12 min-h-[500px]">
                        <h3 class="font-bold text-emerald-800 text-center mb-8 text-sm">🍀 ${petData.name}의 공원 산책로 🍀</h3>
                        
                        <div class="absolute top-10 left-10 text-2xl opacity-40">🌳</div>
                        <div class="absolute top-40 right-12 text-2xl opacity-40">🌳</div>
                        <div class="absolute bottom-20 left-12 text-3xl opacity-40">🌊</div>
                        <div class="absolute bottom-40 right-10 text-xl opacity-40">🌷</div>
                        <div class="absolute top-1/2 left-4 text-xl opacity-40">🌻</div>

                        <div class="relative w-full h-[400px]">
                            <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="none">
                                <path d="M 50 100 L 80 80 L 20 60 L 80 40 L 50 10" fill="none" stroke="#dcfce7" stroke-width="8" stroke-linecap="round" stroke-dasharray="1 15"/>
                            </svg>

                            <div class="absolute top-[5%] left-1/2 -translate-x-1/2 flex flex-col items-center">
                                <div class="w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center text-white border-4 border-white shadow-lg text-lg"><i class="fas fa-crown"></i></div>
                                <span class="text-[9px] font-bold text-purple-600 mt-1">100일 도착</span>
                            </div>

                            <div class="absolute top-[35%] right-[10%] flex flex-col items-center">
                                <div class="w-8 h-8 bg-blue-400 rounded-full flex items-center justify-center text-white border-4 border-white shadow-md text-[10px] font-bold">60</div>
                            </div>

                            <div class="absolute top-[60%] left-[10%] flex flex-col items-center">
                                <div class="w-8 h-8 bg-orange-400 rounded-full flex items-center justify-center text-white border-4 border-white shadow-md text-[10px] font-bold">30</div>
                            </div>

                            <div class="absolute z-20 transition-all duration-1000 ease-out" 
                                 style="bottom: ${progressPercent}%; left: ${50 + Math.sin(progressPercent * 0.1) * 30}%; transform: translateX(-50%);">
                                <div class="relative animate-bounce">
                                    <img src="${petData.profileImageUrl || 'https://via.placeholder.com/150'}" class="w-14 h-14 rounded-full border-[4px] border-white shadow-xl object-cover">
                                    <div class="absolute -top-8 left-1/2 -translate-x-1/2 whitespace-nowrap bg-teal-500 text-white text-[10px] font-bold px-2 py-1 rounded-full">${streakCount}일째!</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        // --- 일기 목록 (커서 방식 페이지네이션 적용) ---
        async function renderDiaryList(container, type) {
            if (diaryList.length === 0) {
                container.innerHTML = `<div class="p-10 text-center text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i>일기를 불러오는 중...</div>`;
                await loadMoreDiaries(type);
            }
            displayDiaries(container, type);
        }

        async function loadMoreDiaries(type) {
            let q;
            const baseQuery = collection(db, "diaries");
            const constraints = [orderBy("timestamp", "desc"), limit(10)];
            
            if (type === 'private') constraints.unshift(where("userId", "==", currentUser.uid));
            else constraints.unshift(where("isPublic", "==", true));
            
            if (lastDiaryDoc) constraints.push(startAfter(lastDiaryDoc));
            
            const snap = await getDocs(query(baseQuery, ...constraints));
            if (snap.empty) { isMoreDiaries = false; return; }
            
            lastDiaryDoc = snap.docs[snap.docs.length - 1];
            snap.forEach(d => diaryList.push({id: d.id, ...d.data()}));
            if (snap.docs.length < 10) isMoreDiaries = false;
        }

        function displayDiaries(container, type) {
            container.innerHTML = '';
            const grid = document.createElement('div');
            grid.className = "p-6 grid gap-6 pt-4";
            
            diaryList.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-3xl overflow-hidden shadow-sm border cursor-pointer";
                card.onclick = () => showDetail(item);
                card.innerHTML = `
                    ${item.imageUrl ? `<img src="${item.imageUrl}" class="w-full h-48 object-cover">` : ''}
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] bg-slate-100 px-2 py-1 rounded-full text-slate-500">${item.diaryDate?.replace(/-/g, '.')}</span>
                            ${type === 'public' ? `<span class="text-[10px] font-bold text-slate-400">by ${item.userEmail.split('@')[0]}</span>` : ''}
                        </div>
                        <h3 class="font-bold text-slate-800 text-base mb-1">${item.title}</h3>
                        <p class="text-slate-700 text-sm line-clamp-3">${item.content}</p>
                    </div>`;
                grid.appendChild(card);
            });
            container.appendChild(grid);

            if (isMoreDiaries) {
                const moreBtn = document.createElement('button');
                moreBtn.className = "w-full py-4 text-sm font-bold text-teal-600";
                moreBtn.innerText = "일기 더 불러오기";
                moreBtn.onclick = async () => {
                    await loadMoreDiaries(type);
                    displayDiaries(container, type);
                };
                container.appendChild(moreBtn);
            }
        }

        window.showDetail = async (item) => {
            history.pushState({ popup: 'detail' }, '', '#detail');
            const modal = document.createElement('div');
            modal.id = "diaryModal";
            modal.className = "fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 animate-fade-in";
            modal.onclick = (e) => { if (e.target === modal) history.back(); };
            modal.innerHTML = `
                <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden max-h-[85vh] flex flex-col shadow-2xl relative" onclick="event.stopPropagation()">
                    ${item.imageUrl ? `<img src="${item.imageUrl}" class="w-full h-48 object-cover flex-shrink-0">` : ''}
                    <div class="p-8 overflow-y-auto flex-1 no-scrollbar text-center">
                        <div class="flex justify-between mb-4">
                            <span class="text-xs font-bold text-teal-600">${item.diaryDate?.replace(/-/g, '.')}</span>
                            <button onclick="history.back()" class="text-slate-300"><i class="fas fa-times"></i></button>
                        </div>
                        <h3 class="font-bold text-xl text-slate-800 mb-3">${item.title}</h3>
                        <p class="text-slate-800 text-sm leading-relaxed text-left">${item.content.replace(/\n/g, '<br>')}</p>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.renderWrite = (editData = null) => {
            history.pushState({ popup: 'write' }, '', '#write');
            const todayStr = new Date().toISOString().split('T')[0];
            appDiv.innerHTML = `
                <div class="p-8 animate-fade-in flex-1 bg-white h-screen overflow-y-auto pb-20">
                    <div class="flex justify-between items-center mb-10">
                        <button onclick="history.back()" class="text-slate-400"><i class="fas fa-arrow-left"></i></button>
                        <h2 class="font-bold text-lg">기록하기</h2>
                        <button onclick="saveDiary()" class="text-teal-600 font-bold">저장</button>
                    </div>
                    <div class="space-y-6">
                        <input type="date" id="diaryDateInput" value="${todayStr}" class="w-full p-3 bg-slate-50 rounded-xl outline-none font-bold">
                        <input type="text" id="diaryTitle" placeholder="제목" class="w-full p-4 bg-slate-50 rounded-2xl outline-none text-lg border focus:border-teal-500">
                        <div id="imagePreview" onclick="document.getElementById('fileInput').click()" class="w-full h-48 bg-slate-50 rounded-[2rem] flex flex-col items-center justify-center border-2 border-dashed border-slate-200 overflow-hidden cursor-pointer">
                            <i class="fas fa-camera text-slate-200 text-2xl mb-2"></i><span class="text-xs text-slate-400 font-bold">사진 추가</span>
                        </div>
                        <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="previewImage(event)">
                        <textarea id="diaryContent" rows="6" placeholder="내용을 입력하세요." class="w-full p-6 bg-slate-50 rounded-[2rem] outline-none text-sm border focus:border-teal-500"></textarea>
                        <div class="flex items-center gap-3"><input type="checkbox" id="isPublic" class="w-5 h-5 accent-teal-500"><label for="isPublic" class="text-sm font-bold text-slate-600">공개하기</label></div>
                    </div>
                </div>`;
        };

        window.saveDiary = async () => {
            const content = document.getElementById('diaryContent').value.trim();
            const title = document.getElementById('diaryTitle').value.trim();
            if (!title || !content) return alert("제목과 내용을 입력해주세요.");

            let file = document.getElementById('fileInput').files[0];
            let imageUrl = '';
            if (file) {
                file = await resizeImage(file, 2000); // 가로 2000px 리사이징
                const snap = await uploadBytes(ref(storage, `diaries/${currentUser.uid}/${Date.now()}`), file);
                imageUrl = await getDownloadURL(snap.ref);
            }
            
            const todayStr = new Date().toISOString().split('T')[0];
            await addDoc(collection(db, "diaries"), {
                title, content, diaryDate: document.getElementById('diaryDateInput').value,
                imageUrl, isPublic: document.getElementById('isPublic').checked,
                userId: currentUser.uid, userEmail: currentUser.email, timestamp: Date.now(),
                actualCreatedDate: todayStr, likes: [], comments: []
            });
            history.back();
        };

        window.renderEditPet = () => {
            history.pushState({ popup: 'edit' }, '', '#edit');
            appDiv.innerHTML = `
                <div class="p-8 animate-fade-in bg-white h-screen overflow-y-auto">
                    <div class="flex justify-between items-center mb-10">
                        <button onclick="history.back()" class="text-slate-400"><i class="fas fa-arrow-left"></i></button>
                        <h2 class="font-bold text-lg">정보 수정</h2>
                        <button onclick="savePetUpdate()" class="text-teal-600 font-bold">완료</button>
                    </div>
                    <div class="space-y-6">
                        <div id="profilePreview" onclick="document.getElementById('profileInput').click()" class="w-32 h-32 mx-auto bg-slate-50 rounded-full border overflow-hidden">
                            <img src="${petData.profileImageUrl || ''}" class="w-full h-full object-cover">
                        </div>
                        <input type="file" id="profileInput" class="hidden" onchange="previewProfileImage(event)">
                        <input id="editPetName" type="text" value="${petData.name}" class="w-full p-4 bg-slate-50 rounded-xl outline-none" placeholder="아이 이름">
                        <input id="editPetBirth" type="date" value="${petData.birthDate}" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                    </div>
                </div>
            `;
        };

        window.savePetUpdate = async () => {
            let file = document.getElementById('profileInput').files[0];
            let profileImageUrl = petData.profileImageUrl;
            if (file) {
                file = await resizeImage(file, 2000);
                const snap = await uploadBytes(ref(storage, `profiles/${currentUser.uid}`), file);
                profileImageUrl = await getDownloadURL(snap.ref);
            }
            await updateDoc(doc(db, "pets", currentUser.uid), { 
                name: document.getElementById('editPetName').value, 
                birthDate: document.getElementById('editPetBirth').value, 
                profileImageUrl 
            });
            await refreshPetData();
            history.back();
        };

        window.handleLogout = () => signOut(auth);
        window.previewImage = (e) => {
            const reader = new FileReader();
            reader.onload = () => { document.getElementById('imagePreview').innerHTML = `<img src="${reader.result}" class="w-full h-full object-cover">`; };
            reader.readAsDataURL(e.target.files[0]);
        };
        window.previewProfileImage = (e) => {
            const reader = new FileReader();
            reader.onload = () => { document.getElementById('profilePreview').querySelector('img').src = reader.result; };
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
