<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펫다이어리 프로토타입</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // ✅ 대표님의 Firebase 설정값이 이미 적용되었습니다!
        const firebaseConfig = {
            apiKey: "AIzaSyDn6hcoBuDPlv5pf-D3nF4tVa309H6ydvc",
            authDomain: "petdiary-595a2.firebaseapp.com",
            projectId: "petdiary-595a2",
            storageBucket: "petdiary-595a2.firebasestorage.app",
            messagingSenderId: "693055914176",
            appId: "1:693055914176:web:e98a698d7cade73a9ead25",
            measurementId: "G-2FEP68LDJK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const storage = getStorage();

        const appDiv = document.getElementById('app');
        let currentUser = null;
        let petData = null;

        // 상태 감지 및 화면 전환
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const petDoc = await getDoc(doc(db, "pets", user.uid));
                if (petDoc.exists()) {
                    petData = petDoc.data();
                    renderMain();
                } else {
                    renderPetSetup();
                }
            } else {
                renderLogin();
            }
        });

        // 1. 로그인/회원가입 화면
        function renderLogin() {
            appDiv.innerHTML = `
                <div class="flex flex-col items-center justify-center h-screen p-8 text-center">
                    <div class="w-20 h-20 bg-teal-500 rounded-3xl flex items-center justify-center mb-6 shadow-lg">
                        <i class="fas fa-paw text-white text-4xl"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800 mb-2">펫다이어리</h1>
                    <p class="text-gray-500 mb-8">우리 아이와의 소중한 기록</p>
                    <input id="email" type="email" placeholder="이메일 (예: test@test.com)" class="w-full p-4 bg-gray-100 rounded-xl mb-3 outline-none focus:ring-2 focus:ring-teal-500">
                    <input id="password" type="password" placeholder="비밀번호 (6자리 이상)" class="w-full p-4 bg-gray-100 rounded-xl mb-6 outline-none focus:ring-2 focus:ring-teal-500">
                    <button onclick="handleAuth('login')" class="w-full p-4 bg-slate-900 text-white rounded-xl font-bold mb-3 shadow-md">로그인</button>
                    <button onclick="handleAuth('signup')" class="w-full p-4 border border-gray-300 text-gray-600 rounded-xl font-bold">회원가입</button>
                </div>
            `;
        }

        // 2. 반려동물 정보 입력 (가입 후 최초 1회)
        function renderPetSetup() {
            appDiv.innerHTML = `
                <div class="p-8 animate-fade-in">
                    <h2 class="text-2xl font-bold mb-2 text-gray-800">반가워요! 🐾</h2>
                    <p class="text-gray-500 mb-8">반려동물의 정보를 입력해 주세요.</p>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">아이 이름</label>
                            <input id="petName" type="text" placeholder="예: 초코, 멍멍이" class="w-full p-4 border rounded-xl outline-none focus:border-teal-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">나이</label>
                            <input id="petAge" type="text" placeholder="예: 3살, 5개월" class="w-full p-4 border rounded-xl outline-none focus:border-teal-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">성향/수준</label>
                            <select id="petLevel" class="w-full p-4 border rounded-xl outline-none focus:border-teal-500 bg-white">
                                <option value="조용함">얌전하고 조용해요</option>
                                <option value="보통">적당히 활동적이에요</option>
                                <option value="활발함">에너지가 넘쳐요!</option>
                            </select>
                        </div>
                        <button onclick="savePetInfo()" class="w-full p-4 bg-teal-500 text-white rounded-xl font-bold mt-4 shadow-lg hover:bg-teal-600 transition">시작하기</button>
                    </div>
                </div>
            `;
        }

        // 3. 메인 다이어리 목록 (3줄 요약 적용)
        async function renderMain() {
            appDiv.innerHTML = `
                <div class="p-6 pb-24 animate-fade-in">
                    <header class="flex justify-between items-end mb-8">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-800">${petData.name}의 다이어리</h2>
                            <p class="text-teal-600 font-medium text-sm">${petData.age} • ${petData.level}</p>
                        </div>
                        <button onclick="handleLogout()" class="text-gray-400 text-xs hover:text-red-400">로그아웃</button>
                    </header>
                    <div id="diaryList" class="space-y-6">
                        <p class="text-center text-gray-300 py-20">기록을 불러오고 있어요...</p>
                    </div>
                </div>
                <button onclick="renderWrite()" class="fixed bottom-8 right-8 w-16 h-16 bg-teal-500 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl z-10 hover:scale-110 transition active:scale-95">
                    <i class="fas fa-plus"></i>
                </button>
            `;
            loadDiaries();
        }

        // 일기 불러오기 및 요약 표시
        async function loadDiaries() {
            const q = query(collection(db, "diaries"), where("userId", "==", currentUser.uid), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            const listDiv = document.getElementById('diaryList');
            
            if (querySnapshot.empty) {
                listDiv.innerHTML = `<div class="text-center py-20 text-gray-400">아이와의 첫 추억을 남겨보세요!</div>`;
                return;
            }

            listDiv.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 cursor-pointer active:bg-gray-50 transition";
                card.onclick = () => showDetail(data); // 클릭 시 팝업창
                card.innerHTML = `
                    ${data.imageUrl ? `<img src="${data.imageUrl}" class="w-full h-48 object-cover">` : ''}
                    <div class="p-4">
                        <p class="text-gray-700 text-sm leading-relaxed line-clamp-3">${data.content}</p>
                        <p class="text-[10px] text-gray-400 mt-3">${new Date(data.timestamp).toLocaleDateString()}</p>
                    </div>
                `;
                listDiv.appendChild(card);
            });
        }

        // 4. 상세 내용 팝업창 (모달)
        window.showDetail = function(data) {
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 animate-fade-in";
            modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
            modal.innerHTML = `
                <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden max-h-[85vh] flex flex-col shadow-2xl">
                    ${data.imageUrl ? `<img src="${data.imageUrl}" class="w-full h-72 object-cover">` : ''}
                    <div class="p-6 overflow-y-auto">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs font-bold text-teal-500">${new Date(data.timestamp).toLocaleDateString()}</span>
                            <button onclick="this.closest('.fixed').remove()" class="text-gray-400"><i class="fas fa-times"></i></button>
                        </div>
                        <p class="text-gray-800 whitespace-pre-wrap leading-relaxed">${data.content}</p>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // 5. 일기 쓰기 화면
        window.renderWrite = function() {
            appDiv.innerHTML = `
                <div class="p-6 animate-fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="renderMain()" class="text-gray-400"><i class="fas fa-times"></i></button>
                        <h2 class="font-bold text-gray-800">새 기록 남기기</h2>
                        <button onclick="saveDiary()" class="text-teal-600 font-bold">저장</button>
                    </div>
                    <div class="space-y-4">
                        <div id="imagePreview" onclick="document.getElementById('fileInput').click()" class="w-full h-64 bg-gray-50 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-gray-200 cursor-pointer overflow-hidden">
                            <i class="fas fa-camera text-3xl text-gray-300 mb-2"></i>
                            <span class="text-gray-400 text-sm">사진 추가</span>
                        </div>
                        <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="previewImage(event)">
                        <textarea id="diaryContent" rows="10" placeholder="${petData.name}와 어떤 하루를 보냈나요?" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border-none resize-none text-gray-700"></textarea>
                    </div>
                </div>
            `;
        }

        // --- 기능 로직 ---
        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                if (type === 'signup') await createUserWithEmailAndPassword(auth, email, password);
                else await signInWithEmailAndPassword(auth, email, password);
            } catch (e) { alert("로그인 실패: 이메일 형식과 비밀번호(6자 이상)를 확인해 주세요."); }
        };

        window.savePetInfo = async () => {
            const name = document.getElementById('petName').value;
            const age = document.getElementById('petAge').value;
            const level = document.getElementById('petLevel').value;
            if (!name || !age) return alert("정보를 모두 입력해 주세요!");
            await setDoc(doc(db, "pets", currentUser.uid), { name, age, level });
            petData = { name, age, level };
            renderMain();
        };

        window.previewImage = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                const preview = document.getElementById('imagePreview');
                preview.innerHTML = `<img src="${reader.result}" class="w-full h-full object-cover">`;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        window.saveDiary = async () => {
            const content = document.getElementById('diaryContent').value;
            const file = document.getElementById('fileInput').files[0];
            if (!content) return alert("내용을 적어주세요!");

            let imageUrl = "";
            if (file) {
                const storageRef = ref(storage, `images/${currentUser.uid}/${Date.now()}`);
                const snapshot = await uploadBytes(storageRef, file);
                imageUrl = await getDownloadURL(snapshot.ref);
            }

            await addDoc(collection(db, "diaries"), {
                userId: currentUser.uid,
                content,
                imageUrl,
                timestamp: Date.now()
            });
            renderMain();
        };

        window.handleLogout = () => signOut(auth);
    </script>
</body>
</html>
