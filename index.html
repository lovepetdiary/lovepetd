<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펫다이어리 - 기획팀 공유용</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative overflow-x-hidden">
        </div>

    <script>
        // 애플리케이션 상태
        let state = {
            step: 'landing',
            petData: { name: '', age: '', mode: '', personality: '' },
            diaries: []
        };

        const app = document.getElementById('app');

        function render() {
            if (state.step === 'landing') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-screen p-10 text-center slide-in">
                        <div class="w-20 h-20 bg-teal-500 rounded-[2rem] flex items-center justify-center text-white mb-8 shadow-xl shadow-teal-100">
                            <i class="fas fa-paw text-4xl"></i>
                        </div>
                        <h1 class="text-3xl font-black text-slate-900 mb-4 tracking-tighter">펫다이어리</h1>
                        <p class="text-slate-500 leading-relaxed mb-12 font-medium italic text-sm">"기획 포인트: 감성적인 첫인상"</p>
                        <button onclick="goStep('onboarding-data')" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all">시작하기</button>
                    </div>
                `;
            } 
            
            else if (state.step === 'onboarding-data') {
                app.innerHTML = `
                    <div class="p-8 pt-20 bg-white min-h-screen flex flex-col slide-in">
                        <h2 class="text-2xl font-black text-slate-900 mb-8 leading-tight underline decoration-teal-500 underline-offset-8">1단계: 기본 정보</h2>
                        <div class="space-y-6 flex-grow">
                            <input type="text" id="petName" placeholder="아이 이름" class="w-full bg-slate-50 p-5 rounded-2xl border-none focus:ring-2 focus:ring-teal-500 outline-none" value="${state.petData.name}">
                            <input type="number" id="petAge" placeholder="나이 (숫자만)" class="w-full bg-slate-50 p-5 rounded-2xl border-none focus:ring-2 focus:ring-teal-500 outline-none" value="${state.petData.age}">
                            <button onclick="saveData()" class="w-full bg-teal-500 text-white py-5 rounded-2xl font-bold text-lg mt-10 shadow-lg">다음으로</button>
                        </div>
                    </div>
                `;
            }

            else if (state.step === 'onboarding-mode') {
                app.innerHTML = `
                    <div class="p-8 pt-20 bg-white min-h-screen slide-in">
                        <h2 class="text-2xl font-black text-slate-900 mb-2 leading-tight">2단계: 기록 모드 선택</h2>
                        <p class="text-slate-400 text-sm mb-10 italic">나이에 따른 맞춤형 모드 추천 기획</p>
                        <div class="space-y-4">
                            <button onclick="selectMode('성장')" class="w-full p-6 border-2 border-slate-50 rounded-3xl bg-slate-50 hover:border-teal-500 flex items-center gap-5 transition-all">
                                <div class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center text-teal-500 shadow-sm"><i class="fas fa-chart-line"></i></div>
                                <div class="text-left font-bold text-slate-900">성장 기록 모드</div>
                            </button>
                            <button onclick="selectMode('일상')" class="w-full p-6 border-2 border-slate-50 rounded-3xl bg-slate-50 hover:border-teal-500 flex items-center gap-5 transition-all">
                                <div class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center text-blue-500 shadow-sm"><i class="fas fa-camera"></i></div>
                                <div class="text-left font-bold text-slate-900">일상 추억 모드</div>
                            </button>
                            <button onclick="selectMode('건강')" class="w-full p-6 border-2 border-slate-50 rounded-3xl bg-slate-50 hover:border-teal-500 flex items-center gap-5 transition-all">
                                <div class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center text-rose-500 shadow-sm"><i class="fas fa-heartbeat"></i></div>
                                <div class="text-left font-bold text-slate-900">건강 관리 모드</div>
                            </button>
                        </div>
                    </div>
                `;
            }

            else if (state.step === 'onboarding-chat') {
                app.innerHTML = `
                    <div class="min-h-screen bg-slate-50 p-8 pt-20 flex flex-col slide-in text-left">
                        <h2 class="text-2xl font-black text-slate-900 mb-8 leading-tight">3단계: 대화형 온보딩</h2>
                        <div class="flex-grow">
                            <div class="flex gap-3 items-end">
                                <div class="w-10 h-10 bg-teal-500 rounded-2xl flex items-center justify-center text-white shrink-0 shadow-lg"><i class="fas fa-comment"></i></div>
                                <div class="bg-white p-5 rounded-3xl rounded-bl-none shadow-sm text-sm text-slate-700 leading-relaxed border border-slate-100">
                                    반가워요! <span class="font-bold text-teal-600">${state.petData.name}</span>(이)는 어떤 성격인가요? 산책을 좋아하나요?
                                </div>
                            </div>
                        </div>
                        <div class="space-y-3 py-10">
                            <button onclick="finishOnboarding('활발함')" class="w-full bg-white border-2 border-slate-200 py-5 rounded-2xl font-bold text-slate-700 hover:border-teal-500">🏃‍♂️ 에너지가 넘쳐요!</button>
                            <button onclick="finishOnboarding('얌전함')" class="w-full bg-white border-2 border-slate-200 py-5 rounded-2xl font-bold text-slate-700 hover:border-teal-500">🏠 얌전하고 조용해요!</button>
                        </div>
                    </div>
                `;
            }

            else if (state.step === 'main-dashboard') {
                app.innerHTML = `
                    <div class="min-h-screen pb-24 slide-in text-left">
                        <header class="bg-white px-6 py-5 flex justify-between items-center sticky top-0 z-20 border-b border-slate-100">
                            <h1 class="text-lg font-black text-slate-900">${state.petData.name}의 기록</h1>
                            <div class="flex gap-4 text-slate-400"><i class="fas fa-share-alt"></i><i class="fas fa-cog"></i></div>
                        </header>
                        <div class="p-6 text-left">
                            <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                                <p class="text-teal-400 font-bold text-[10px] uppercase tracking-widest mb-1">100일 챌린지</p>
                                <p class="text-2xl font-black mb-4 italic">Day ${state.diaries.length}/100</p>
                                <div class="w-full bg-white/10 h-2 rounded-full overflow-hidden mb-4">
                                    <div class="bg-teal-400 h-full transition-all" style="width: ${Math.max(5, (state.diaries.length / 100) * 100)}%"></div>
                                </div>
                                <p class="text-white/40 text-[10px]">설정된 모드: <b>${state.petData.mode}</b> | 성격: <b>${state.petData.personality}</b></p>
                            </div>
                        </div>
                        <div class="px-6 space-y-4">
                            <h3 class="font-black text-slate-900">오늘의 타임라인</h3>
                            ${state.diaries.length === 0 ? '<div class="py-20 text-center text-slate-300 font-bold">기록을 시작해주세요!</div>' : ''}
                            <div id="diaryList" class="space-y-4"></div>
                        </div>
                        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6">
                            <button onclick="openModal()" class="bg-slate-900 text-white w-full py-5 rounded-2xl font-black text-lg shadow-2xl">일기 쓰기</button>
                        </div>
                        <div id="modal" class="fixed inset-0 bg-slate-900/60 z-50 hidden items-end justify-center p-4 backdrop-blur-sm">
                            <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
                                <h2 class="text-xl font-black text-slate-900 mb-6">새로운 기록</h2>
                                <textarea id="diaryContent" class="w-full bg-slate-50 rounded-3xl p-6 h-40 outline-none mb-6 border-none" placeholder="오늘의 일기..."></textarea>
                                <button onclick="addDiary()" class="w-full bg-teal-500 text-white py-5 rounded-2xl font-black shadow-xl">저장</button>
                            </div>
                        </div>
                    </div>
                `;
                renderDiaries();
            }
        }

        function goStep(step) { state.step = step; render(); }
        
        function saveData() {
            state.petData.name = document.getElementById('petName').value;
            state.petData.age = document.getElementById('petAge').value;
            if (state.petData.name && state.petData.age) goStep('onboarding-mode');
        }

        function selectMode(mode) { state.petData.mode = mode; goStep('onboarding-chat'); }
        function finishOnboarding(pers) { state.petData.personality = pers; goStep('main-dashboard'); }
        
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function addDiary() {
            const content = document.getElementById('diaryContent').value;
            if (!content) return;
            state.diaries.push({
                date: new Date().toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' }),
                content: content
            });
            closeModal();
            render();
        }

        function renderDiaries() {
            const list = document.getElementById('diaryList');
            if(!list) return;
            list.innerHTML = state.diaries.map(d => `
                <div class="bg-white p-5 rounded-3xl border border-slate-50 shadow-sm">
                    <p class="text-[10px] font-black text-teal-500 mb-1">${d.date}</p>
                    <p class="text-sm text-slate-700 font-medium">${d.content}</p>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
