<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펫다이어리 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .tab-active { color: #14b8a6; border-bottom: 3px solid #14b8a6; font-weight: bold; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative flex flex-col">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, addDoc, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // ✅ 대표님의 설정값 유지
        const firebaseConfig = {
            apiKey: "AIzaSyDn6hcoBuDPlv5pf-D3nF4tVa309H6ydvc",
            authDomain: "petdiary-595a2.firebaseapp.com",
            projectId: "petdiary-595a2",
            storageBucket: "petdiary-595a2.firebasestorage.app",
            messagingSenderId: "693055914176",
            appId: "1:693055914176:web:e98a698d7cade73a9ead25",
            measurementId: "G-2FEP68LDJK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const storage = getStorage();

        const appDiv = document.getElementById('app');
        let currentUser = null;
        let petData = null;
        let activeTab = 'home'; // home, diary, public, talk, store

        // 초기화 및 상태 감지
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await refreshPetData();
                renderLayout();
            } else {
                renderLogin();
            }
        });

        async function refreshPetData() {
            const petDoc = await getDoc(doc(db, "pets", currentUser.uid));
            if (petDoc.exists()) {
                petData = petDoc.data();
            } else {
                renderPetSetup();
            }
        }

        // 로그인 화면
        function renderLogin() {
            appDiv.innerHTML = `
                <div class="flex flex-col items-center justify-center h-screen p-8 text-center animate-fade-in">
                    <div class="w-20 h-20 bg-teal-500 rounded-[2rem] flex items-center justify-center mb-6 shadow-xl">
                        <i class="fas fa-paw text-white text-4xl"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-800 mb-2">펫다이어리</h1>
                    <p class="text-slate-400 mb-10 text-sm">반려동물과 함께하는 특별한 여정</p>
                    <div class="w-full space-y-3">
                        <input id="email" type="email" placeholder="이메일 주소" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500 transition">
                        <input id="password" type="password" placeholder="비밀번호" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500 transition">
                        <button onclick="handleAuth('login')" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-bold shadow-lg">로그인</button>
                        <button onclick="handleAuth('signup')" class="w-full p-4 text-slate-500 font-medium">처음이신가요? 회원가입</button>
                    </div>
                </div>
            `;
        }

        // 레이아웃 (상단 탭 포함)
        function renderLayout() {
            if (!petData) return;
            appDiv.innerHTML = `
                <nav class="sticky top-0 bg-white/80 backdrop-blur-md z-30 border-b border-slate-100">
                    <div class="flex justify-between items-center px-6 pt-6 pb-2">
                        <h1 class="text-xl font-bold text-slate-800">PET DIARY</h1>
                        <div class="flex gap-4">
                            <button onclick="renderEditPet()" class="text-xs font-bold text-teal-600 bg-teal-50 px-3 py-1.5 rounded-full">정보수정</button>
                            <button onclick="handleLogout()" class="text-xs font-bold text-slate-400">로그아웃</button>
                        </div>
                    </div>
                    <div class="flex overflow-x-auto no-scrollbar px-2">
                        <button onclick="changeTab('home')" class="flex-none px-4 py-3 text-sm ${activeTab === 'home' ? 'tab-active' : 'text-slate-400'}">메인</button>
                        <button onclick="changeTab('diary')" class="flex-none px-4 py-3 text-sm ${activeTab === 'diary' ? 'tab-active' : 'text-slate-400'}">내 일기</button>
                        <button onclick="changeTab('public')" class="flex-none px-4 py-3 text-sm ${activeTab === 'public' ? 'tab-active' : 'text-slate-400'}">공개일기</button>
                        <button onclick="changeTab('talk')" class="flex-none px-4 py-3 text-sm ${activeTab === 'talk' ? 'tab-active' : 'text-slate-400'}">잡담</button>
                        <button onclick="changeTab('store')" class="flex-none px-4 py-3 text-sm ${activeTab === 'store' ? 'tab-active' : 'text-slate-400'}">스토어</button>
                    </div>
                </nav>
                <div id="content-area" class="flex-1 overflow-y-auto"></div>
                <button onclick="renderWrite()" class="fixed bottom-8 right-8 w-14 h-14 bg-teal-500 text-white rounded-full shadow-2xl flex items-center justify-center text-xl z-40 transition hover:scale-110 active:scale-95">
                    <i class="fas fa-edit"></i>
                </button>
            `;
            updateContent();
        }

        async function updateContent() {
            const area = document.getElementById('content-area');
            if (activeTab === 'home') renderHome(area);
            else if (activeTab === 'diary') renderDiaryList(area, 'private');
            else if (activeTab === 'public') renderDiaryList(area, 'public');
            else if (activeTab === 'talk') area.innerHTML = '<div class="py-20 text-center text-slate-400">커뮤니티 준비 중입니다!</div>';
            else if (activeTab === 'store') area.innerHTML = '<div class="py-20 text-center text-slate-400">스토어 준비 중입니다!</div>';
        }

        // 1. 메인 화면 (대시보드)
        async function renderHome(container) {
            const diaries = await getDocs(query(collection(db, "diaries"), where("userId", "==", currentUser.uid)));
            const diaryCount = diaries.size;
            
            // 날짜 계산
            const birthDate = new Date(petData.birthDate);
            const today = new Date();
            const diffDays = Math.floor((today - birthDate) / (1000 * 60 * 60 * 24)) + 1;
            
            // 100일 완성일 계산
            const daysLeft = 100 - diaryCount;
            const targetDate = new Date();
            targetDate.setDate(today.getDate() + daysLeft);
            const targetStr = targetDate.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' });

            container.innerHTML = `
                <div class="p-6 animate-fade-in space-y-6">
                    <div class="relative w-full aspect-square rounded-[3rem] overflow-hidden shadow-2xl">
                        <img src="${petData.profileImageUrl || 'https://via.placeholder.com/400'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                        <div class="absolute bottom-8 left-8 text-white">
                            <h2 class="text-3xl font-bold mb-1">${petData.name}</h2>
                            <p class="text-teal-300 font-bold">생후 ${diffDays}일째</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-teal-50 p-6 rounded-[2rem] border border-teal-100">
                            <p class="text-xs text-teal-600 font-bold mb-1">작성한 일기</p>
                            <p class="text-2xl font-black text-teal-800">${diaryCount}<span class="text-sm font-normal ml-1">일차</span></p>
                        </div>
                        <div class="bg-orange-50 p-6 rounded-[2rem] border border-orange-100">
                            <p class="text-xs text-orange-600 font-bold mb-1">100일 완성 예정</p>
                            <p class="text-lg font-black text-orange-800">${targetStr}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // 2 & 3. 일기 목록 (내 일기 & 공개 일기 통합)
        async function renderDiaryList(container, type) {
            container.innerHTML = '<p class="py-20 text-center text-slate-300">기록을 찾는 중...</p>';
            let q;
            if (type === 'private') {
                q = query(collection(db, "diaries"), where("userId", "==", currentUser.uid));
            } else {
                q = query(collection(db, "diaries"), where("isPublic", "==", true));
            }
            
            const snap = await getDocs(q);
            container.innerHTML = '';
            
            if (snap.empty) {
                container.innerHTML = '<div class="py-20 text-center text-slate-400">아직 일기가 없습니다.</div>';
                return;
            }

            let list = [];
            snap.forEach(d => list.push({id: d.id, ...d.data()}));
            list.sort((a,b) => b.timestamp - a.timestamp);

            const grid = document.createElement('div');
            grid.className = "p-6 grid grid-cols-1 gap-6 animate-fade-in";
            
            list.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 cursor-pointer active:scale-95 transition";
                card.onclick = () => showDetail(item);
                card.innerHTML = `
                    ${item.imageUrl ? `<img src="${item.imageUrl}" class="w-full h-56 object-cover">` : ''}
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-bold px-2 py-1 bg-slate-100 rounded-full text-slate-500">${new Date(item.timestamp).toLocaleDateString()}</span>
                            ${item.isPublic ? '<span class="text-[10px] text-teal-500 font-bold">공개됨</span>' : ''}
                        </div>
                        <p class="text-slate-700 text-sm leading-relaxed line-clamp-3">${item.content}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
            container.appendChild(grid);
        }

        // 일기 상세 보기 (수정/삭제 포함)
        window.showDetail = function(item) {
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 animate-fade-in";
            modal.innerHTML = `
                <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden max-h-[85vh] flex flex-col shadow-2xl">
                    ${item.imageUrl ? `<img src="${item.imageUrl}" class="w-full h-80 object-cover">` : ''}
                    <div class="p-8 overflow-y-auto">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-xs font-bold text-teal-600">${new Date(item.timestamp).toLocaleDateString()}</span>
                            <div class="flex gap-3">
                                ${item.userId === currentUser.uid ? `
                                    <button onclick='renderWrite(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="text-xs font-bold text-slate-400">수정</button>
                                    <button onclick="deleteDiary('${item.id}')" class="text-xs font-bold text-red-400">삭제</button>
                                ` : ''}
                                <button onclick="this.closest('.fixed').remove()" class="text-slate-300"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                        <p class="text-slate-800 whitespace-pre-wrap leading-relaxed text-sm">${item.content}</p>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // 일기 작성 및 수정 화면
        window.renderWrite = function(editData = null) {
            // 상세보기가 열려있다면 닫기
            const openModal = document.querySelector('.fixed.bg-black\\/80');
            if(openModal) openModal.remove();

            appDiv.innerHTML = `
                <div class="p-8 animate-fade-in flex-1">
                    <div class="flex justify-between items-center mb-10">
                        <button onclick="renderLayout()" class="text-slate-400"><i class="fas fa-arrow-left"></i></button>
                        <h2 class="font-bold text-lg">${editData ? '일기 수정' : '오늘의 기록'}</h2>
                        <button onclick="saveDiary('${editData ? editData.id : ''}')" class="text-teal-600 font-bold">저장</button>
                    </div>
                    <div class="space-y-6">
                        <div id="imagePreview" onclick="document.getElementById('fileInput').click()" class="w-full h-64 bg-slate-50 rounded-[2rem] flex flex-col items-center justify-center border-2 border-dashed border-slate-200 cursor-pointer overflow-hidden transition hover:bg-slate-100">
                            ${editData && editData.imageUrl ? `<img src="${editData.imageUrl}" class="w-full h-full object-cover">` : '<i class="fas fa-camera text-3xl text-slate-200 mb-2"></i><span class="text-slate-400 text-xs">사진 추가</span>'}
                        </div>
                        <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="previewImage(event)">
                        <textarea id="diaryContent" rows="8" placeholder="${petData.name}와 어떤 하루를 보내셨나요?" class="w-full p-6 bg-slate-50 rounded-[2rem] outline-none border-none resize-none text-slate-700 text-sm leading-relaxed">${editData ? editData.content : ''}</textarea>
                        <div class="flex items-center gap-3 px-2">
                            <input type="checkbox" id="isPublic" class="w-5 h-5 rounded accent-teal-500" ${editData && editData.isPublic ? 'checked' : ''}>
                            <label for="isPublic" class="text-sm font-bold text-slate-600">이 일기를 모두에게 공개할래요</label>
                        </div>
                    </div>
                </div>
            `;
        }

        // 정보 수정 화면 (마이페이지)
        window.renderEditPet = function() {
            appDiv.innerHTML = `
                <div class="p-8 animate-fade-in flex-1">
                    <div class="flex justify-between items-center mb-10">
                        <button onclick="renderLayout()" class="text-slate-400"><i class="fas fa-arrow-left"></i></button>
                        <h2 class="font-bold text-lg">우리 아이 정보 수정</h2>
                        <button onclick="savePetInfoUpdate()" class="text-teal-600 font-bold">완료</button>
                    </div>
                    <div class="space-y-6">
                        <div id="profilePreview" onclick="document.getElementById('profileInput').click()" class="w-40 h-40 mx-auto bg-slate-50 rounded-full flex flex-col items-center justify-center border-2 border-dashed border-slate-200 cursor-pointer overflow-hidden relative group">
                            <img src="${petData.profileImageUrl || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                                <i class="fas fa-camera text-white"></i>
                            </div>
                        </div>
                        <input type="file" id="profileInput" class="hidden" accept="image/*" onchange="previewProfileImage(event)">
                        
                        <div class="space-y-4">
                            <div>
                                <label class="text-xs font-bold text-slate-400 ml-2">아이 이름</label>
                                <input id="editPetName" type="text" value="${petData.name}" class="w-full p-4 bg-slate-50 rounded-xl outline-none mt-1">
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-400 ml-2">태어난 날 (생일)</label>
                                <input id="editPetBirth" type="date" value="${petData.birthDate}" class="w-full p-4 bg-slate-50 rounded-xl outline-none mt-1">
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 초기 반려동물 설정 (가입 직후)
        function renderPetSetup() {
            appDiv.innerHTML = `
                <div class="p-8 animate-fade-in h-screen flex flex-col justify-center">
                    <h2 class="text-3xl font-black mb-2 text-slate-800">반가워요!🐾</h2>
                    <p class="text-slate-400 mb-10 text-sm leading-relaxed">아이의 정보를 입력하면<br>특별한 기념일을 계산해 드릴게요.</p>
                    <div class="space-y-4">
                        <input id="setupName" type="text" placeholder="아이 이름" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100">
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <label class="text-xs font-bold text-slate-400 block mb-1">태어난 날을 골라주세요</label>
                            <input id="setupBirth" type="date" class="w-full bg-transparent outline-none">
                        </div>
                        <button onclick="initialPetSetup()" class="w-full p-5 bg-teal-500 text-white rounded-3xl font-bold shadow-xl shadow-teal-100">시작하기</button>
                    </div>
                </div>
            `;
        }

        // --- 데이터 처리 함수들 ---

        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert("이메일과 비밀번호를 입력해 주세요.");
            try {
                if (type === 'signup') await createUserWithEmailAndPassword(auth, email, password);
                else await signInWithEmailAndPassword(auth, email, password);
            } catch (e) { alert("로그인 정보를 확인해 주세요!"); }
        };

        window.initialPetSetup = async () => {
            const name = document.getElementById('setupName').value;
            const birthDate = document.getElementById('setupBirth').value;
            if(!name || !birthDate) return alert("모든 정보를 입력해 주세요!");
            await setDoc(doc(db, "pets", currentUser.uid), { name, birthDate, profileImageUrl: '' });
            await refreshPetData();
            renderLayout();
        };

        window.savePetInfoUpdate = async () => {
            const name = document.getElementById('editPetName').value;
            const birthDate = document.getElementById('editPetBirth').value;
            const file = document.getElementById('profileInput').files[0];
            
            let profileImageUrl = petData.profileImageUrl;
            if (file) {
                const storageRef = ref(storage, `profiles/${currentUser.uid}`);
                const snap = await uploadBytes(storageRef, file);
                profileImageUrl = await getDownloadURL(snap.ref);
            }

            await updateDoc(doc(db, "pets", currentUser.uid), { name, birthDate, profileImageUrl });
            await refreshPetData();
            renderLayout();
        };

        window.saveDiary = async (id = '') => {
            const content = document.getElementById('diaryContent').value;
            const isPublic = document.getElementById('isPublic').checked;
            const file = document.getElementById('fileInput').files[0];
            if (!content) return alert("내용을 입력해 주세요.");

            let imageUrl = '';
            if (file) {
                const storageRef = ref(storage, `diaries/${currentUser.uid}/${Date.now()}`);
                const snap = await uploadBytes(storageRef, file);
                imageUrl = await getDownloadURL(snap.ref);
            }

            const diaryData = {
                content, isPublic, timestamp: Date.now(), userId: currentUser.uid
            };
            if(imageUrl) diaryData.imageUrl = imageUrl;

            if(id) await updateDoc(doc(db, "diaries", id), diaryData);
            else await addDoc(collection(db, "diaries"), diaryData);
            
            renderLayout();
        };

        window.deleteDiary = async (id) => {
            if(!confirm("정말 이 일기를 지울까요?")) return;
            await deleteDoc(doc(db, "diaries", id));
            document.querySelector('.fixed.bg-black\\/80').remove();
            renderLayout();
        };

        window.changeTab = (tab) => { activeTab = tab; renderLayout(); };
        window.handleLogout = () => signOut(auth);
        window.previewImage = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('imagePreview').innerHTML = `<img src="${reader.result}" class="w-full h-full object-cover">`;
            };
            reader.readAsDataURL(e.target.files[0]);
        };
        window.previewProfileImage = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('profilePreview').querySelector('img').src = reader.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

    </script>
</body>
</html>
