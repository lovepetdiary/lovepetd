ㅈ<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멍냥일기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .tab-active { color: #14b8a6; border-bottom: 3px solid #14b8a6; font-weight: bold; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #toast { visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #333; color: #fff; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 100; left: 50%; bottom: 50px; font-size: 14px; }
        #toast.show { visibility: visible; animation: fadeIn 0.3s, fadeOut 0.3s 2.5s; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-transition { transition: opacity 0.5s ease-in-out; }
        .dot-indicator { width: 4px; height: 4px; background-color: #14b8a6; border-radius: 50%; margin: 0 auto; margin-top: 2px; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative flex flex-col">
    </div>
    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, fetchSignInMethodsForEmail, deleteUser, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, addDoc, query, where, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDn6hcoBuDPlv5pf-D3nF4tVa309H6ydvc",
            authDomain: "petdiary-595a2.firebaseapp.com",
            projectId: "petdiary-595a2",
            storageBucket: "petdiary-595a2.firebasestorage.app",
            messagingSenderId: "693055914176",
            appId: "1:693055914176:web:e98a698d7cade73a9ead25",
            measurementId: "G-2FEP68LDJK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const storage = getStorage();

        const appDiv = document.getElementById('app');
        let currentUser = null;
        let petData = null;
        let userData = null;
        let activeTab = 'home'; 
        let chatStep = 0;
        let setupData = { profileImageUrl: '', name: '', birthDate: '', focusArea: '' };
        let backPressCount = 0;
        
        window.currentPublicSort = 'date';
        window.selectedDiaryDate = null;
        window.currentPrivateViewMode = null;
        window.currentRandomDiary = null;

        window.addEventListener('popstate', (event) => {
            const detailModal = document.getElementById('diaryModal');
            if (detailModal) detailModal.remove();
            
            const withdrawModal = document.getElementById('withdrawModal');
            if (withdrawModal) withdrawModal.remove();
            
            const profileModal = document.getElementById('profileImgModal');
            if (profileModal) profileModal.remove();

            if (event.state && event.state.tab) {
                activeTab = event.state.tab;
                renderLayout();
            } else if (!event.state || (event.state && event.state.tab === 'home')) {
                if (activeTab === 'home') {
                    backPressCount++;
                    if (backPressCount === 1) {
                        showToast("펫다이어리를 나가시려면 뒤로 가기를 한 번 더 눌러주세요");
                        history.pushState({ tab: 'home' }, '', '#home');
                        setTimeout(() => { backPressCount = 0; }, 2000);
                    } else if (backPressCount === 2) {
                        window.location.replace('about:blank');
                    }
                } else {
                    activeTab = 'home';
                    renderLayout();
                }
            } else {
                renderLayout();
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await refreshPetData();
            } else {
                renderLogin();
            }
        });

        async function refreshPetData() {
            const petDoc = await getDoc(doc(db, "pets", currentUser.uid));
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            
            if (userDoc.exists()) userData = userDoc.data();
            else userData = {};

            if (petDoc.exists()) {
                petData = petDoc.data();
                if(!history.state) history.replaceState({ tab: 'home' }, '', '#home');
                renderLayout();
            } else {
                renderPetSetup();
            }
        }

        function showToast(msg) {
            const x = document.getElementById("toast");
            x.innerText = msg;
            x.className = "show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
        }

        window.checkPasswordMatch = () => {
            const p1 = document.getElementById('signupPassword').value;
            const p2 = document.getElementById('signupPasswordConfirm').value;
            const msg = document.getElementById('pwMatchMsg');
            if (p2 && p1 !== p2) {
                msg.innerText = "비밀번호가 일치하지 않습니다.";
                msg.classList.remove('text-teal-500');
                msg.classList.add('text-red-500');
            } else if (p2 && p1 === p2) {
                msg.innerText = "비밀번호가 일치합니다.";
                msg.classList.remove('text-red-500');
                msg.classList.add('text-teal-500');
            } else {
                msg.innerText = "";
            }
        };

        window.execDaumPostcode = () => {
            new daum.Postcode({
                oncomplete: function(data) {
                    document.getElementById('signupAddress').value = data.roadAddress;
                    document.getElementById('signupAddressDetail').focus();
                }
            }).open();
        };

        window.execDaumPostcodeEdit = () => {
            new daum.Postcode({
                oncomplete: function(data) {
                    document.getElementById('editUserAddress').value = data.roadAddress;
                }
            }).open();
        };

        window.checkEmailDuplicate = async () => {
            const email = document.getElementById('signupEmail').value;
            if(!email) return alert("이메일을 입력해 주세요.");
            try {
                const methods = await fetchSignInMethodsForEmail(auth, email);
                if (methods.length > 0) alert("이미 사용 중인 이메일입니다.");
                else alert("사용 가능한 이메일입니다.");
            } catch (e) { alert("이메일 형식을 확인해 주세요."); }
        };

        window.togglePassword = (id) => {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling.querySelector('i');
            input.type = (input.type === "password") ? "text" : "password";
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        };

        window.renderLogin = function() {
            appDiv.innerHTML = `
                <div class="flex flex-col items-center justify-center h-screen p-8 text-center animate-fade-in">
                    <div class="w-20 h-20 bg-teal-500 rounded-[2rem] flex items-center justify-center mb-6 shadow-xl">
                        <i class="fas fa-paw text-white text-4xl"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-800 mb-2">펫다이어리</h1>
                    <p class="text-slate-400 mb-10 text-sm">반려동물과 함께하는 특별한 여정</p>
                    <div class="w-full space-y-3">
                        <input id="email" type="email" placeholder="이메일 주소" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500 transition">
                        <div class="relative w-full">
                            <input id="password" type="password" placeholder="비밀번호" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500 transition">
                            <button onclick="togglePassword('password')" class="absolute right-4 top-4 text-slate-400"><i class="fas fa-eye"></i></button>
                        </div>
                        <button onclick="handleLogin()" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-bold shadow-lg mt-2">로그인</button>
                        <button onclick="renderSignup()" class="w-full p-4 text-slate-500 font-medium">처음이신가요? 회원가입</button>
                    </div>
                </div>
            `;
        };

        window.renderSignup = function() {
            appDiv.innerHTML = `
                <div class="p-8 animate-fade-in flex flex-col h-screen overflow-y-auto bg-white">
                    <button onclick="renderLogin()" class="text-slate-400 mb-6 self-start"><i class="fas fa-arrow-left"></i> 뒤로</button>
                    <h2 class="text-2xl font-bold text-slate-800 mb-6">회원가입</h2>
                    
                    <div class="space-y-3 mb-6">
                        <div class="flex gap-2">
                            <input id="signupEmail" type="email" placeholder="이메일 주소 (필수)" class="flex-1 p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-teal-500">
                            <button onclick="checkEmailDuplicate()" class="px-4 bg-slate-800 text-white rounded-2xl text-xs font-bold">중복확인</button>
                        </div>
                        <div class="relative w-full">
                            <input id="signupPassword" type="password" placeholder="비밀번호 (6자 이상)" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-teal-500">
                            <button onclick="togglePassword('signupPassword')" class="absolute right-4 top-4 text-slate-400"><i class="fas fa-eye"></i></button>
                        </div>
                        <div class="relative w-full">
                            <input id="signupPasswordConfirm" type="password" oninput="checkPasswordMatch()" placeholder="비밀번호 확인" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-teal-500">
                            <button onclick="togglePassword('signupPasswordConfirm')" class="absolute right-4 top-4 text-slate-400"><i class="fas fa-eye"></i></button>
                        </div>
                        <p id="pwMatchMsg" class="text-[11px] ml-2 font-bold h-4"></p>
                    </div>

                    <h3 class="font-bold text-slate-700 mb-3 text-sm">보호자 선택 정보 (책 배송 등 혜택용)</h3>
                    <div class="space-y-3 mb-8">
                        <input id="signupName" type="text" placeholder="이름 (선택)" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none">
                        <input id="signupPhone" type="tel" placeholder="휴대폰 번호 (선택)" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none">
                        <div class="flex gap-2">
                            <input id="signupAddress" type="text" placeholder="주소 찾기를 눌러주세요 (선택)" readonly class="flex-1 p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm">
                            <button onclick="execDaumPostcode()" class="px-4 bg-slate-100 text-slate-600 rounded-2xl text-xs font-bold">주소찾기</button>
                        </div>
                        <input id="signupAddressDetail" type="text" placeholder="상세 주소를 입력해주세요 (선택)" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none">
                        <div class="px-2">
                            <label class="text-[11px] text-slate-400 font-bold">보호자 생년월일 (선택)</label>
                            <input id="signupBirth" type="date" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none mt-1">
                        </div>
                    </div>

                    <button onclick="processSignup()" class="w-full p-4 bg-teal-500 text-white rounded-2xl font-bold shadow-lg mb-8">가입하고 시작하기</button>
                </div>
            `;
        };

        function renderPetSetup() {
            chatStep = 0;
            appDiv.innerHTML = `<div class="flex flex-col h-screen bg-slate-50 w-full animate-fade-in"><div class="p-4 bg-white shadow-sm flex items-center border-b border-slate-100 z-10"><div class="w-10 h-10 bg-teal-500 rounded-full flex items-center justify-center text-white mr-3"><i class="fas fa-robot"></i></div><div><h2 class="font-bold text-slate-800 text-sm">멍냥일기 도우미</h2><p class="text-[10px] text-teal-500">온라인</p></div></div><div id="chatContainer" class="flex-1 overflow-y-auto p-5 space-y-4 pb-20"></div><div id="chatInputArea" class="p-4 bg-white border-t border-slate-100 min-h-[80px] flex items-center justify-center"></div></div>`;
            nextChatStep();
        }

        function appendBotMsg(text) {
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = "flex w-full animate-fade-in mb-2";
            msg.innerHTML = `<div class="bg-white p-3.5 rounded-2xl rounded-tl-sm shadow-sm text-sm text-slate-700 max-w-[85%] border border-slate-100">${text}</div>`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        function appendUserMsg(text) {
            const container = document.getElementById('chatContainer');
            const msg = document.createElement('div');
            msg.className = "flex w-full justify-end animate-fade-in mb-4";
            msg.innerHTML = `<div class="bg-teal-500 p-3.5 rounded-2xl rounded-tr-sm shadow-sm text-sm text-white max-w-[85%]">${text}</div>`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        window.nextChatStep = () => {
            const inputArea = document.getElementById('chatInputArea');
            inputArea.innerHTML = '';
            if (chatStep === 0) {
                setTimeout(() => appendBotMsg("가입을 환영합니다! 🎉<br>아이와의 특별한 기록을 시작해볼까요?"), 500);
                setTimeout(() => {
                    appendBotMsg("먼저, 우리 예쁜 아이의 사진을 보여주시겠어요?");
                    inputArea.innerHTML = `<input type="file" id="setupProfileInput" class="hidden" accept="image/*" onchange="handleSetupImage(event)"><button onclick="document.getElementById('setupProfileInput').click()" class="flex-1 py-3 bg-teal-50 text-teal-600 font-bold rounded-xl">사진 고르기</button><button onclick="skipSetupImage()" class="ml-2 px-4 py-3 text-slate-400 text-sm">건너뛰기</button>`;
                }, 1500);
            } else if (chatStep === 1) {
                setTimeout(() => {
                    appendBotMsg("너무 귀엽네요! 😍 이 아이의 이름은 무엇인가요?");
                    inputArea.innerHTML = `<input type="text" id="setupNameInput" placeholder="이름 입력" class="flex-1 p-3 bg-slate-100 rounded-xl outline-none mr-2 px-4"><button onclick="handleSetupName()" class="w-12 h-12 bg-teal-500 text-white rounded-xl flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>`;
                }, 500);
            } else if (chatStep === 2) {
                setTimeout(() => {
                    appendBotMsg(`'${setupData.name}'! 이름이 참 예뻐요. 😊`);
                    setTimeout(() => {
                        appendBotMsg(`${setupData.name}가 태어난 날이나 입양된 날짜를 알려주시면, 제가 특별한 날들을 계산해 드릴게요!`);
                        inputArea.innerHTML = `<input type="date" id="setupBirthInput" class="flex-1 p-3 bg-slate-100 rounded-xl outline-none mr-2 px-4 text-slate-600"><button onclick="handleSetupBirth()" class="w-12 h-12 bg-teal-500 text-white rounded-xl flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>`;
                    }, 1000);
                }, 500);
            } else if (chatStep === 3) {
                setTimeout(() => {
                    appendBotMsg("기억해 둘게요! 🗓️");
                    setTimeout(() => {
                        appendBotMsg(`지금 ${setupData.name}를 위해 어떤 부분을 가장 집중적으로 기록하고 싶으신가요?`);
                        inputArea.innerHTML = `<div class="flex gap-2 flex-wrap justify-center w-full"><button onclick="handleSetupFocus('건강')" class="px-4 py-2 bg-slate-100 rounded-full text-sm">건강 돌봄</button><button onclick="handleSetupFocus('성장')" class="px-4 py-2 bg-slate-100 rounded-full text-sm">성장 기록</button><button onclick="handleSetupFocus('관리')" class="px-4 py-2 bg-slate-100 rounded-full text-sm">식단 및 미용</button></div>`;
                    }, 1000);
                }, 500);
            } else if (chatStep === 4) {
                setTimeout(() => {
                    appendBotMsg(`준비 끝! 이제 시작해볼까요? ✨`);
                    inputArea.innerHTML = `<button onclick="finishSetup()" class="w-full p-4 bg-teal-500 text-white font-bold rounded-xl">다이어리 시작하기</button>`;
                }, 500);
            }
        };

        window.handleSetupImage = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const storageRef = ref(storage, `profiles/${currentUser.uid}_${Date.now()}`);
            const snap = await uploadBytes(storageRef, file);
            setupData.profileImageUrl = await getDownloadURL(snap.ref);
            appendUserMsg("사진을 골랐어요!");
            chatStep++; nextChatStep();
        };
        window.skipSetupImage = () => { appendUserMsg("나중에 올릴게요."); chatStep++; nextChatStep(); };
        window.handleSetupName = () => { setupData.name = document.getElementById('setupNameInput').value; appendUserMsg(setupData.name); chatStep++; nextChatStep(); };
        window.handleSetupBirth = () => { setupData.birthDate = document.getElementById('setupBirthInput').value; appendUserMsg(setupData.birthDate); chatStep++; nextChatStep(); };
        window.handleSetupFocus = (f) => { setupData.focusArea = f; appendUserMsg(f); chatStep++; nextChatStep(); };
        window.finishSetup = async () => {
            await setDoc(doc(db, "pets", currentUser.uid), setupData);
            await refreshPetData();
        };

        window.processSignup = async () => {
            const email = document.getElementById('signupEmail').value;
            const pwd = document.getElementById('signupPassword').value;
            const pwdConfirm = document.getElementById('signupPasswordConfirm').value;
            if(!email || pwd !== pwdConfirm) return alert("입력 정보를 확인해 주세요.");
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pwd);
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    email, ownerName: document.getElementById('signupName').value,
                    phone: document.getElementById('signupPhone').value,
                    address: document.getElementById('signupAddress').value + " " + document.getElementById('signupAddressDetail').value,
                    ownerBirth: document.getElementById('signupBirth').value,
                    preferredViewMode: 'card',
                    createdAt: Date.now()
                });
            } catch (e) { alert("회원가입 실패: " + e.message); }
        };

        window.handleLogin = async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            } catch (e) { alert("로그인 실패!"); }
        };

        function renderLayout() {
            if (!petData) return;

            // 1. 이미 네비게이션바가 있는지 확인하여 중복 렌더링 방지 (스크롤 유지의 핵심)
            let nav = appDiv.querySelector('nav');
            
            if (!nav) {
                // 처음 렌더링될 때만 전체 레이아웃 구조를 만듭니다.
                appDiv.innerHTML = `
                    <nav class="sticky top-0 bg-white/80 backdrop-blur-md z-30 border-b border-slate-100">
                        <div class="flex justify-between items-center px-6 pt-6 pb-2">
                            <div class="flex items-center gap-2 cursor-pointer" onclick="changeTab('home')">
                                <i class="fas fa-paw text-2xl text-teal-500"></i>
                                <img src="${petData.profileImageUrl || 'https://via.placeholder.com/150'}" class="w-8 h-8 rounded-full object-cover shadow-sm ml-1">
                                <span class="font-bold text-slate-800 text-sm">${petData.name}</span>
                            </div>
                            <div class="flex gap-4">
                                <button onclick="renderEditPet()" class="text-xs font-bold text-teal-600 bg-teal-50 px-3 py-1.5 rounded-full">정보수정</button>
                                <button onclick="handleLogout()" class="text-xs font-bold text-slate-400">로그아웃</button>
                            </div>
                        </div>
                        <div class="flex overflow-x-auto no-scrollbar px-2">
                            <button onclick="changeTab('home')" class="flex-none px-4 py-3 text-sm">소중하개🐾</button>
                            <button onclick="changeTab('intro')" class="flex-none px-4 py-3 text-sm">알아보개🐾</button>
                            <button onclick="changeTab('diary')" class="flex-none px-4 py-3 text-sm">사랑하개🐾</button>
                            <button onclick="changeTab('public')" class="flex-none px-4 py-3 text-sm">함께하개🐾</button>
                            <button onclick="changeTab('store')" class="flex-none px-4 py-3 text-sm">장만하개🐾</button>
                            <button onclick="changeTab('community')" class="flex-none px-4 py-3 text-sm">소통하개🐾</button>
                        </div>
                    </nav>
                    <div id="content-area" class="flex-1 overflow-y-auto pb-20"></div>
                    <button onclick="renderWrite()" class="fixed bottom-8 right-8 w-14 h-14 bg-teal-500 text-white rounded-full shadow-2xl flex items-center justify-center text-xl z-40 transition hover:scale-110"><i class="fas fa-edit"></i></button>
                `;
            }

            // 2. 현재 선택된 탭에 맞춰 메뉴 버튼들의 스타일만 업데이트합니다. (innerHTML을 건드리지 않음)
            const buttons = appDiv.querySelectorAll('nav button[onclick^="changeTab"]');
            buttons.forEach(btn => {
                const action = btn.getAttribute('onclick');
                if (action && action.includes(`'${activeTab}'`)) {
                    btn.className = "flex-none px-4 py-3 text-sm tab-active";
                } else {
                    btn.className = "flex-none px-4 py-3 text-sm text-slate-400";
                }
            });

            // 3. 컨텐츠 영역만 새로 그립니다.
            updateContent();
        }

        window.changeTab = (tab) => { 
            activeTab = tab; 
            if (tab === 'diary') window.selectedDiaryDate = null;
            history.pushState({ tab }, '', `#${tab}`); 
            renderLayout(); 
        };

                else if (mode === 'list') contentDiv.className = "p-6 flex flex-col gap-3 pt-4";
                else if (mode === 'gallery') contentDiv.className = "p-4 grid grid-cols-3 gap-2 pt-4";
                
                if (filteredList.length === 0 && window.selectedDiaryDate) {
                    contentDiv.className = "p-6 grid gap-6 pt-4";
                    contentDiv.innerHTML = `
                        <div class="py-24 text-center animate-fade-in">
                            <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-dashed border-slate-200">
                                <i class="fas fa-sticky-note text-slate-200 text-2xl"></i>
                            </div>
                            <p class="text-slate-400 font-bold text-sm">해당 날짜 일기가 없습니다.</p>
                            <button onclick="renderWrite()" class="mt-6 px-6 py-2 bg-teal-50 text-teal-600 rounded-full text-xs font-bold border border-teal-100 shadow-sm transition hover:bg-teal-100">
                                <i class="fas fa-plus mr-1"></i> 기록 남기기
                            </button>
                        </div>`;
                } else {
                    filteredList.forEach(item => {
                        const card = document.createElement('div');
                        card.onclick = () => showDetail(item);
                        
                        if (mode === 'card') {
                            card.className = "bg-white rounded-3xl overflow-hidden shadow-sm border cursor-pointer relative";
                            card.innerHTML = `${item.imageUrl ? `<img src="${item.imageUrl}" class="w-full h-48 object-cover">` : ''}
                            <div class="p-5">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-[10px] bg-slate-100 px-2 py-1 rounded-full text-slate-500 z-10 relative">${item.diaryDate.replace(/-/g, '.')}</span>
                                </div>
                                <h3 class="font-bold text-slate-800 text-base mb-1 z-10 relative">${item.title}</h3>
                                <p class="text-slate-700 text-sm line-clamp-3 z-10 relative">${item.content}</p>
                            </div>`;
                        } else if (mode === 'list') {
                            card.className = "flex items-center gap-3 bg-white p-3 rounded-2xl shadow-sm border cursor-pointer relative";
                            card.innerHTML = `
                                <div class="text-[11px] font-bold text-slate-500 w-12 text-center leading-tight flex-none">${item.diaryDate.substring(5).replace('-','.')}</div>
                                ${item.imageUrl ? `<img src="${item.imageUrl}" class="w-12 h-12 rounded-lg object-cover flex-none">` : `<div class="w-12 h-12 rounded-lg bg-slate-50 border border-slate-100 flex flex-none items-center justify-center text-slate-300"><i class="fas fa-image"></i></div>`}
                                <div class="flex-1 min-w-0 pr-2">
                                    <div class="font-bold text-sm text-slate-800 truncate">${item.title}</div>
                                    <div class="text-[11px] text-slate-400 truncate mt-0.5">${item.content}</div>
                                </div>
                            `;
                        } else if (mode === 'gallery') {
                            card.className = "aspect-square bg-slate-100 rounded-xl cursor-pointer relative overflow-hidden shadow-sm";
                            card.innerHTML = item.imageUrl 
                                ? `<img src="${item.imageUrl}" class="w-full h-full object-cover hover:scale-110 transition-transform duration-300">`
                                : `<div class="w-full h-full flex flex-col items-center justify-center text-slate-300 text-[10px] bg-slate-50 border border-slate-100 p-2 text-center break-words"><i class="fas fa-file-alt mb-2 text-xl"></i>${item.title.substring(0,6)}...</div>`;
                        }
                        contentDiv.appendChild(card);
                    });
                }
                container.appendChild(contentDiv);
            }
        }

        window.showDetail = async (item, isRefresh = false) => {
            if (!isRefresh) history.pushState({ popup: 'detail' }, '', '#detail');
            
            const docRef = doc(db, "diaries", item.id);
            const docSnap = await getDoc(docRef);
            if(docSnap.exists()) {
                const dData = docSnap.data();
                item = {id: docSnap.id, ...dData, diaryDate: dData.diaryDate || new Date(dData.timestamp).toLocaleDateString('en-CA'), title: dData.title || '일기'};
            }

            const existingModal = document.getElementById('diaryModal');
            if(existingModal) existingModal.remove();

            const likeCount = item.likes ? item.likes.length : 0;
            const isLiked = item.likes && item.likes.includes(currentUser.uid);
            
            let authorStr = '';
            let commentsHTML = '';

            if (item.isPublic && activeTab === 'public') {
                const authorId = item.userEmail ? item.userEmail.split('@')[0] : '익명';
                authorStr = `
                    <div class="flex items-center gap-2 ml-3 border-l border-slate-200 pl-3">
                        <span class="text-xs font-bold text-slate-400">by ${authorId}</span>
                    </div>`;
                
                commentsHTML = `
                    <div class="mt-6 pt-6 border-t border-slate-100">
                        <h4 class="text-sm font-bold text-slate-800 mb-4">댓글 <span class="text-teal-500">${item.comments ? item.comments.length : 0}</span></h4>
                        <div id="commentsList" class="space-y-3 mb-4 max-h-48 overflow-y-auto pr-1 no-scrollbar">
                            ${(item.comments || []).map(c => {
                                const cLikes = c.likes || [];
                                const cIsLiked = cLikes.includes(currentUser.uid);
                                const cAuthor = c.userEmail ? c.userEmail.split('@')[0] : '익명';
                                return `<div class="flex justify-between items-start bg-slate-50 p-3 rounded-2xl"><div><div class="text-[10px] font-bold text-slate-500 mb-1">${cAuthor}</div><div class="text-xs text-slate-700 leading-relaxed">${c.content}</div></div><button onclick="toggleCommentLike('${item.id}', '${c.id}')" class="text-[10px] font-bold ${cIsLiked ? 'text-red-500' : 'text-slate-300'} bg-white px-2 py-1 rounded-full shadow-sm whitespace-nowrap ml-3"><i class="fas fa-heart"></i> ${cLikes.length}</button></div>`;
                            }).join('')}
                        </div>
                        <div class="flex gap-2">
                            <input id="commentInput" type="text" placeholder="댓글을 남겨보세요" class="flex-1 p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none text-xs focus:border-teal-500">
                            <button onclick="addComment('${item.id}')" class="px-4 bg-teal-500 text-white rounded-xl text-xs font-bold shadow-sm">등록</button>
                        </div>
                    </div>
                `;
            }

            const modal = document.createElement('div');
            modal.id = "diaryModal";
            modal.className = "fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 animate-fade-in";
            
            modal.onclick = (e) => {
                if (e.target === modal) history.back();
            };

            modal.innerHTML = `
                <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden max-h-[85vh] flex flex-col shadow-2xl relative" onclick="event.stopPropagation()">
                    ${item.imageUrl ? `<img src="${item.imageUrl}" class="w-full h-48 object-cover flex-shrink-0">` : ''}
                    <div class="p-8 overflow-y-auto flex-1 no-scrollbar">
                        <div class="flex justify-between items-center mb-4">
                            <div class="flex items-center">
                                <span class="text-xs font-bold text-teal-600">${item.diaryDate.replace(/-/g, '.')}</span>
                                ${authorStr}
                            </div>
                            <div class="flex gap-3 items-center">
                                ${activeTab === 'public' ? `<button onclick="toggleLike('${item.id}', event, true)" class="text-xs font-bold ${isLiked ? 'text-red-500' : 'text-slate-300'} bg-slate-50 px-2 py-1 rounded-full"><i class="fas fa-heart"></i> ${likeCount}</button>` : ''}
                                ${item.userId === currentUser.uid ? `<button onclick='renderWrite(${JSON.stringify(item).replace(/'/g, "&#39;")})' class="text-xs font-bold text-slate-400">수정</button><button onclick="deleteDiary('${item.id}')" class="text-xs font-bold text-red-400">삭제</button>` : ''}
                                <button onclick="history.back()" class="text-slate-300 text-lg ml-1"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                        <h3 class="font-bold text-xl text-slate-800 mb-3">${item.title}</h3>
                        <p class="text-slate-800 text-sm leading-relaxed">${item.content.replace(/\n/g, '<br>')}</p>
                        ${commentsHTML}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            if (isRefresh && activeTab === 'public') {
                const list = document.getElementById('commentsList');
                if(list) list.scrollTop = list.scrollHeight;
            }
        };

        window.renderWrite = (editData = null) => {
            history.pushState({ popup: 'write' }, '', '#write');
            const openModal = document.getElementById('diaryModal');
            if(openModal) openModal.remove();
            
            const todayStr = new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
            
            appDiv.innerHTML = `
                <div class="p-8 animate-fade-in flex-1 bg-white h-screen overflow-y-auto pb-20">
                    <div class="flex justify-between items-center mb-10">
                        <button onclick="history.back()" class="text-slate-400"><i class="fas fa-arrow-left"></i></button>
                        <h2 class="font-bold text-lg">기록하기</h2>
                        <button onclick="saveDiary('${editData ? editData.id : ''}')" class="text-teal-600 font-bold">저장</button>
                    </div>
                    <div class="space-y-6">
                        <div class="flex items-center gap-4">
                            <label class="text-xs font-bold text-slate-600 w-12">날짜</label>
                            <input type="date" id="diaryDateInput" value="${editData?.diaryDate || todayStr}" class="p-3 bg-slate-50 rounded-xl outline-none text-slate-600 text-sm flex-1 font-bold">
                        </div>
                        
                        <input type="text" id="diaryTitle" placeholder="일기 제목을 입력해주세요" value="${editData?.title || ''}" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-slate-800 text-lg border border-transparent focus:border-teal-500">
                        
                        <div id="imagePreview" onclick="document.getElementById('fileInput').click()" class="w-full h-64 bg-slate-50 rounded-[2rem] flex flex-col items-center justify-center border-2 border-dashed border-slate-200 overflow-hidden cursor-pointer">
                            ${editData && editData.imageUrl ? `<img src="${editData.imageUrl}" class="w-full h-full object-cover">` : '<i class="fas fa-camera text-slate-200 text-2xl mb-2"></i><span class="text-xs text-slate-400 font-bold">사진 추가</span>'}
                        </div>
                        <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="previewImage(event)">
                        
                        <textarea id="diaryContent" rows="8" placeholder="오늘 아이와 어떤 일이 있었나요?" class="w-full p-6 bg-slate-50 rounded-[2rem] outline-none text-sm leading-relaxed border border-transparent focus:border-teal-500">${editData ? editData.content : ''}</textarea>
                        
                        <div class="flex items-center gap-3">
                            <input type="checkbox" id="isPublic" class="w-5 h-5 accent-teal-500" ${editData && editData.isPublic ? 'checked' : ''}>
                            <label for="isPublic" class="text-sm font-bold text-slate-600">공개 일기로 등록하기</label>
                        </div>
                    </div>
                </div>`;
        };

        window.renderEditPet = function() {
            history.pushState({ popup: 'edit' }, '', '#edit');
            
            const currentPrefMode = userData?.preferredViewMode || 'card';
            
            appDiv.innerHTML = `
                <div class="p-8 animate-fade-in flex-1 bg-white h-screen overflow-y-auto pb-20">
                    <div class="flex justify-between items-center mb-10">
                        <button onclick="history.back()" class="text-slate-400"><i class="fas fa-arrow-left"></i></button>
                        <h2 class="font-bold text-lg">정보 수정</h2>
                        <button onclick="savePetInfoUpdate()" class="text-teal-600 font-bold">완료</button>
                    </div>
                    <div class="space-y-6">
                        <div id="profilePreview" onclick="document.getElementById('profileInput').click()" class="w-40 h-40 mx-auto bg-slate-50 rounded-full border-2 border-dashed border-slate-200 overflow-hidden">
                            <img src="${petData.profileImageUrl || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                        </div>
                        <input type="file" id="profileInput" class="hidden" accept="image/*" onchange="previewProfileImage(event)">
                        
                        <div>
                            <label class="text-xs font-bold text-slate-500 ml-1">반려동물 이름</label>
                            <input id="editPetName" type="text" value="${petData.name}" class="w-full p-4 mt-1 bg-slate-50 rounded-xl outline-none">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 ml-1">생일/입양일</label>
                            <input id="editPetBirth" type="date" value="${petData.birthDate}" class="w-full p-4 mt-1 bg-slate-50 rounded-xl outline-none">
                        </div>
                        <div class="pt-6 border-t border-slate-100">
                            <label class="text-xs font-bold text-slate-500 ml-1">내 일기 기본 보기 설정</label>
                            <div class="flex gap-2 mt-2">
                                <label class="flex-1 p-3 bg-slate-50 rounded-xl flex items-center justify-center gap-2 cursor-pointer text-sm font-bold text-slate-600">
                                    <input type="radio" name="preferredViewMode" value="card" class="accent-teal-500" ${currentPrefMode === 'card' ? 'checked' : ''}> 카드
                                </label>
                                <label class="flex-1 p-3 bg-slate-50 rounded-xl flex items-center justify-center gap-2 cursor-pointer text-sm font-bold text-slate-600">
                                    <input type="radio" name="preferredViewMode" value="list" class="accent-teal-500" ${currentPrefMode === 'list' ? 'checked' : ''}> 리스트
                                </label>
                                <label class="flex-1 p-3 bg-slate-50 rounded-xl flex items-center justify-center gap-2 cursor-pointer text-sm font-bold text-slate-600">
                                    <input type="radio" name="preferredViewMode" value="gallery" class="accent-teal-500" ${currentPrefMode === 'gallery' ? 'checked' : ''}> 갤러리
                                </label>
                            </div>
                        </div>
                        <div class="pt-6 border-t border-slate-100">
                            <label class="text-xs font-bold text-slate-500 ml-1">보호자 연락처</label>
                            <input id="editUserPhone" type="tel" value="${userData?.phone || ''}" placeholder="휴대폰 번호" class="w-full p-4 mt-1 bg-slate-50 rounded-xl outline-none">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 ml-1">보호자 주소</label>
                            <div class="flex gap-2 mt-1">
                                <input id="editUserAddress" type="text" value="${userData?.address || ''}" placeholder="주소 찾기를 눌러주세요" readonly class="flex-1 p-4 bg-slate-50 rounded-xl outline-none text-sm">
                                <button onclick="execDaumPostcodeEdit()" class="px-4 bg-slate-100 text-slate-600 rounded-xl text-xs font-bold">주소찾기</button>
                            </div>
                        </div>
                        
                        <div class="pt-10 border-t border-slate-100">
                            <button onclick="confirmWithdrawal()" class="w-full p-4 text-red-400 text-sm font-bold bg-red-50 rounded-2xl">탈퇴하기</button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.confirmWithdrawal = () => {
            const modal = document.createElement('div');
            modal.id = "withdrawModal";
            modal.className = "fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 animate-fade-in";
            modal.innerHTML = `
                <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl relative">
                    <h3 class="font-bold text-lg mb-2 text-slate-800">회원 탈퇴</h3>
                    <p class="text-sm text-slate-500 mb-6">모든 정보가 삭제됩니다.<br>탈퇴를 위해 비밀번호를 입력해주세요.</p>
                    <div class="relative w-full mb-6">
                        <input id="withdrawPwd" type="password" placeholder="비밀번호 입력" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-teal-500">
                        <button onclick="togglePassword('withdrawPwd')" class="absolute right-4 top-4 text-slate-400"><i class="fas fa-eye"></i></button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="document.getElementById('withdrawModal').remove()" class="flex-1 p-4 bg-slate-100 text-slate-600 rounded-2xl font-bold text-sm">취소</button>
                        <button onclick="processWithdrawal()" class="flex-1 p-4 bg-red-500 text-white rounded-2xl font-bold text-sm">탈퇴하기</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.processWithdrawal = async () => {
            const pwd = document.getElementById('withdrawPwd').value;
            if(!pwd) return alert("비밀번호를 입력해주세요.");
            try {
                const credential = EmailAuthProvider.credential(currentUser.email, pwd);
                await reauthenticateWithCredential(currentUser, credential);
                
                const batch = writeBatch(db);
                batch.delete(doc(db, "pets", currentUser.uid));
                batch.delete(doc(db, "users", currentUser.uid));
                const diaries = await getDocs(query(collection(db, "diaries"), where("userId", "==", currentUser.uid)));
                diaries.forEach(d => batch.delete(d.ref));
                await batch.commit();
                await deleteUser(currentUser);
                alert("그동안 이용해주셔서 감사합니다.");
                location.reload();
            } catch (e) { alert("비밀번호가 틀렸거나 탈퇴 처리에 실패했습니다."); }
        };

        window.deleteDiary = async (id) => {
            if (confirm("정말 이 일기를 삭제하시겠습니까?")) {
                await deleteDoc(doc(db, "diaries", id));
                history.back();
            }
        };

        window.saveDiary = async (id = '') => {
            const content = document.getElementById('diaryContent').value.trim();
            const title = document.getElementById('diaryTitle').value.trim();
            
            if (!title || !content) {
                alert("일기 제목과 내용을 모두 입력해주세요!");
                return;
            }

            const diaryDate = document.getElementById('diaryDateInput').value || new Date().toISOString().split('T')[0];
            const file = document.getElementById('fileInput').files[0];
            let imageUrl = '';
            
            if (file) {
                const snap = await uploadBytes(ref(storage, `diaries/${currentUser.uid}/${Date.now()}`), file);
                imageUrl = await getDownloadURL(snap.ref);
            }
            
            const todayStr = new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
            
            const diaryData = { 
                title,
                diaryDate,
                content, 
                isPublic: document.getElementById('isPublic').checked, 
                userId: currentUser.uid, 
                userEmail: currentUser.email,
                authorProfileImageUrl: petData.profileImageUrl || '',
                actualCreatedDate: todayStr
            };
            if (imageUrl) diaryData.imageUrl = imageUrl;
            
            if (id) {
                await updateDoc(doc(db, "diaries", id), diaryData);
            } else {
                diaryData.timestamp = Date.now();
                diaryData.likes = [];
                diaryData.comments = [];
                await addDoc(collection(db, "diaries"), diaryData);
            }
            history.back(); 
        };

        window.savePetInfoUpdate = async () => {
            const file = document.getElementById('profileInput').files[0];
            let profileImageUrl = petData.profileImageUrl;
            if (file) {
                const snap = await uploadBytes(ref(storage, `profiles/${currentUser.uid}`), file);
                profileImageUrl = await getDownloadURL(snap.ref);
            }
            
            await updateDoc(doc(db, "pets", currentUser.uid), { name: document.getElementById('editPetName').value, birthDate: document.getElementById('editPetBirth').value, profileImageUrl });
            
            const prefMode = document.querySelector('input[name="preferredViewMode"]:checked').value;
            
            await updateDoc(doc(db, "users", currentUser.uid), {
                phone: document.getElementById('editUserPhone').value,
                address: document.getElementById('editUserAddress').value,
                preferredViewMode: prefMode
            });
            
            if(userData) userData.preferredViewMode = prefMode;
            window.currentPrivateViewMode = prefMode;
            
            await refreshPetData();
            history.back();
        };

        window.handleLogout = () => signOut(auth);
        window.previewImage = (e) => {
            const reader = new FileReader();
            reader.onload = () => { document.getElementById('imagePreview').innerHTML = `<img src="${reader.result}" class="w-full h-full object-cover">`; };
            reader.readAsDataURL(e.target.files[0]);
        };
        window.previewProfileImage = (e) => {
            const reader = new FileReader();
            reader.onload = () => { document.getElementById('profilePreview').querySelector('img').src = reader.result; };
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
